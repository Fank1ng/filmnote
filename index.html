<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD&Ceci — 电影剧集评价</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
    --text: #e0e0e0; --text2: #888; --gold: #d4a853;
    --gold-dim: #3a3020; --radius: 10px; --t: 0.2s ease;
    --danger: #a04040; --danger-bg: #2a1515;
    --friend: #5b9db0; --friend-dim: #1a2a30;
    --ceci: #FF69B4; --ceci-dim: #2a1525;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
  }
  .hidden { display: none !important; }

  /* ── Auth ── */
  #authOverlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .auth-box { width: 360px; padding: 32px; }
  .auth-box h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .auth-box h1 .fd { color: var(--gold); }
  .auth-box h1 .ce { color: var(--ceci); }
  .auth-box .subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 16px; }
  .auth-box input {
    width: 100%; padding: 12px; margin-bottom: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); font-size: 0.95rem;
  }
  .auth-box input:focus { border-color: var(--gold); outline: none; }
  .auth-box .btn { width: 100%; margin-bottom: 8px; padding: 12px; }
  .auth-box .toggle { text-align: center; font-size: 0.85rem; color: var(--text2); }
  .auth-box .toggle a { color: var(--gold); cursor: pointer; }
  .auth-error { color: #d44; font-size: 0.85rem; margin-bottom: 8px; }

  /* ── Header ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 1.3rem; font-weight: 700; }
  .logo .fd { color: var(--gold); }
  .logo .ce { color: var(--ceci); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-badge { font-size: 0.8rem; color: var(--gold); }
  .user-menu { position: relative; display: flex; align-items: center; gap: 2px; cursor: pointer; user-select: none; }
  .user-arrow { font-size: 0.65rem; color: var(--text2); transition: var(--t); }
  .user-menu.open .user-arrow { transform: rotate(180deg); }
  .user-dropdown {
    position: absolute; top: 100%; right: 0; margin-top: 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 4px; min-width: 120px; display: none; z-index: 30;
  }
  .user-menu.open .user-dropdown { display: block; }
  .user-dropdown button {
    display: block; width: 100%; padding: 8px 12px; border: none; background: none;
    color: var(--text); font-size: 0.85rem; cursor: pointer; border-radius: 6px; text-align: left;
  }
  .user-dropdown button:hover { background: rgba(255,255,255,0.05); color: var(--gold); }

  /* ── Tabs ── */
  nav { display: flex; gap: 4px; padding: 16px 24px 0; }
  nav button {
    background: none; border: none; color: var(--text2);
    padding: 10px 20px; cursor: pointer; font-size: 0.95rem;
    border-radius: 8px 8px 0 0; transition: var(--t);
  }
  nav button:hover { color: var(--text); background: var(--surface); }
  nav button.active { color: var(--gold); background: var(--surface); }

  /* ── Main ── */
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--gold); }

  /* ── Type Toggle ── */
  .type-toggle { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border-radius: var(--radius); padding: 3px; }
  .type-toggle button {
    flex: 1; padding: 8px 16px; border: none; cursor: pointer;
    background: transparent; color: var(--text2); border-radius: 8px;
    font-size: 0.9rem; font-weight: 500; transition: var(--t);
  }
  .type-toggle button.active { background: var(--gold-dim); color: var(--gold); }

  /* ── TMDb Search ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%; padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); font-size: 0.95rem;
  }
  .search-wrap input:focus { border-color: var(--gold); outline: none; }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 20;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); max-height: 360px; overflow-y: auto;
    display: none; margin-top: 4px;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    cursor: pointer; transition: var(--t); border-bottom: 1px solid var(--border);
  }
  .sr-item:hover { background: rgba(255,255,255,0.04); }
  .sr-item:last-child { border-bottom: none; }
  .sr-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; background: var(--border); }
  .sr-info { flex: 1; }
  .sr-title { font-size: 0.9rem; font-weight: 500; }
  .sr-meta { font-size: 0.75rem; color: var(--text2); }
  .sr-type { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: var(--gold-dim); color: var(--gold); }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); font-size: 0.95rem; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); outline: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* ── Dimensions ── */
  .dim-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .dim-row { display: flex; align-items: center; gap: 12px; }
  .dim-info { min-width: 120px; }
  .dim-name { font-size: 0.9rem; font-weight: 500; }
  .dim-weight { font-size: 0.72rem; color: var(--text2); }
  .dim-slider { flex: 1; display: flex; align-items: center; gap: 10px; }
  .dim-slider input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; background: var(--border); border-radius: 3px; outline: none;
  }
  .dim-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--bg);
  }
  .dim-score { width: 32px; text-align: center; font-weight: 700; font-size: 1rem; color: var(--gold); }
  .total-preview {
    background: var(--gold-dim); border: 1px solid var(--gold);
    border-radius: var(--radius); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .total-label { font-size: 0.9rem; color: var(--gold); }
  .total-value { font-size: 2rem; font-weight: 800; color: var(--gold); }

  /* ── Buttons ── */
  .btn {
    padding: 10px 20px; border-radius: var(--radius); cursor: pointer;
    font-size: 0.9rem; font-weight: 600; border: none; transition: var(--t);
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { background: #c49b45; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-xs { padding: 3px 8px; font-size: 0.7rem; border-radius: 6px; }
  .btn-group { display: flex; gap: 10px; margin-top: 20px; }

  /* ── Season Rating Cards ── */
  .season-section { margin-bottom: 20px; }
  .season-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  }
  .season-header {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .season-header:hover { background: rgba(255,255,255,0.02); }
  .season-title { font-weight: 600; font-size: 0.9rem; }
  .season-score { color: var(--gold); font-weight: 700; }
  .season-body { padding: 0 16px 16px; display: none; }
  .season-body.open { display: block; }
  .season-body .dim-list { gap: 8px; }
  .season-body .dim-info { min-width: 100px; }
  .season-body .dim-name { font-size: 0.8rem; }
  .season-body .dim-slider input[type="range"]::-webkit-slider-thumb { width: 16px; height: 16px; }
  .season-body .dim-score { font-size: 0.85rem; }

  /* ── List ── */
  .list-subtabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .list-subtabs button {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 6px 16px; cursor: pointer; font-size: 0.85rem; border-radius: 20px; transition: var(--t);
  }
  .list-subtabs button:hover { border-color: var(--gold); color: var(--text); }
  .list-subtabs button.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .list-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .list-controls input, .list-controls select {
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 0.85rem;
  }
  .list-controls input:focus, .list-controls select:focus { border-color: var(--gold); outline: none; }
  .search-box { flex: 1; min-width: 180px; }

  .movie-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px; transition: var(--t); cursor: pointer;
    content-visibility: auto; contain-intrinsic-size: auto 90px;
  }
  .movie-card:hover { border-color: var(--gold); }
  .mc-poster { width: 44px; height: 66px; border-radius: 6px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .mc-score {
    width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
    background: var(--gold-dim); border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 800; color: var(--gold);
  }
  .mc-info { flex: 1; min-width: 0; }
  .mc-title { font-weight: 600; font-size: 0.95rem; }
  .mc-meta { font-size: 0.78rem; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 8px; }
  .mc-owner { font-size: 0.7rem; color: var(--gold); background: var(--gold-dim); padding: 1px 6px; border-radius: 4px; }
  .mc-dim-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .mc-dim-scores span { font-size: 0.68rem; color: var(--text2); background: rgba(255,255,255,0.04); padding: 1px 6px; border-radius: 4px; }
  .mc-comment { font-size: 0.8rem; color: var(--text2); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
  .mc-actions { display: flex; flex-direction: row; gap: 6px; flex-shrink: 0; }
  .mc-actions-mobile { display: none; flex-direction: row; gap: 6px; }
  .mc-season-badge { font-size: 0.7rem; color: var(--gold); background: var(--gold-dim); padding: 2px 8px; border-radius: 10px; }
  .mc-scores-compare { display: flex; gap: 10px; align-items: center; min-width: 176px; flex-shrink: 0; }
  .mc-score-sm {
    width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; font-weight: 800; flex-direction: column;
  }
  .mc-score-mine { border: 2px solid var(--gold); background: var(--gold-dim); color: var(--gold); }
  .mc-score-friend { border: 2px solid var(--friend); background: var(--friend-dim); color: var(--friend); }
  .mc-score-ceci { border: 2px solid var(--ceci); background: var(--ceci-dim); color: var(--ceci); }
  .mc-score-label { font-size: 0.55rem; font-weight: 400; line-height: 1; }
  .mc-dim-item {
    width: 50px; display: flex; flex-direction: column; align-items: center;
    padding: 3px 4px; border-radius: 6px; gap: 1px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  }
  .dim-lab { font-size: 0.6rem; color: var(--text2); line-height: 1.1; }
  .dim-val { font-size: 0.8rem; font-weight: 700; line-height: 1.2; }
  .mc-dim-user { font-size: 0.65rem; font-weight: 600; white-space: nowrap; min-width: 75px; }
  .mc-dim-dots { display: flex; gap: 6px; align-items: flex-start; flex-wrap: wrap; }
  .mc-dim-total { display: none; font-size: 0.75rem; font-weight: 700; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }

  /* ── Stats Compare ── */
  .stat-compare-row { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
  .stat-compare-label { width: 110px; font-size: 0.82rem; text-align: right; flex-shrink: 0; }
  .stat-compare-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .stat-compare-values { display: flex; gap: 12px; font-size: 0.78rem; font-weight: 600; width: 70px; flex-shrink: 0; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; text-align: center;
  }
  .stat-value { font-size: 2rem; font-weight: 800; color: var(--gold); }
  .stat-label { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
  .stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .stat-bar-label { width: 110px; font-size: 0.82rem; text-align: right; }
  .stat-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.5s ease; }
  .stat-bar-value { width: 34px; font-size: 0.82rem; font-weight: 600; }
  .score-dist { display: flex; gap: 6px; align-items: stretch; height: 180px; margin-bottom: 20px; padding: 0 4px; position: relative; }
  .score-dist::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 35px, var(--border) 35px, var(--border) 36px);
    opacity: 0.5; pointer-events: none; border-radius: 4px;
  }
  .score-dist-bar { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; z-index: 1; }
  .score-dist-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.5s ease; }
  .score-dist-fill:hover { filter: brightness(1.3); }
  .score-dist-label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; flex-shrink: 0; }
  .score-dist-count { font-size: 0.9rem; font-weight: 700; flex-shrink: 0; }

  /* ── Compare Distribution ── */
  .compare-dist { display: flex; gap: 6px; align-items: stretch; height: 180px; padding: 0 2px; position: relative; }
  .compare-dist::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 35px, var(--border) 35px, var(--border) 36px);
    opacity: 0.5; pointer-events: none; border-radius: 4px;
  }
  .cd-bar-group { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 1; }
  .cd-bars { display: flex; gap: 3px; align-items: flex-end; flex: 1; width: 100%; justify-content: center; }
  .cd-bar { width: 14px; border-radius: 3px 3px 0 0; min-height: 3px; position: relative; transition: height 0.5s ease; }
  .cd-bar:hover { filter: brightness(1.3); }
  .cd-count { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: 700; white-space: nowrap; color: var(--text); }
  .cd-label { font-size: 0.68rem; color: var(--text2); flex-shrink: 0; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; max-width: 600px; width: 92%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 12px; color: var(--gold); }
  .modal .friend-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal .friend-section h4 { font-size: 0.85rem; color: var(--text2); margin-bottom: 8px; }
  .friend-rating {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin-bottom: 6px;
    opacity: 0.8;
  }
  .friend-rating .fr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .friend-rating .fr-name { font-size: 0.8rem; color: var(--gold); }
  .friend-rating .fr-score { font-weight: 700; color: var(--gold); }

  .settings-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--gold);
    color: var(--text); padding: 12px 24px; border-radius: var(--radius);
    font-size: 0.9rem; z-index: 300; opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Discover ── */
  .discover-subtabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .discover-subtabs button {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 6px 16px; cursor: pointer; font-size: 0.85rem; border-radius: 20px; transition: var(--t);
  }
  .discover-subtabs button:hover { border-color: var(--gold); color: var(--text); }
  .discover-subtabs button.active { color: var(--gold); background: var(--gold-dim); border-color: var(--gold); }
  .discover-subtabs button.active.ceci-tab { color: var(--ceci); background: var(--ceci-dim); border-color: var(--ceci); }
  .discover-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .discover-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; transition: var(--t);
    display: flex; flex-direction: column;
  }
  .discover-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .dc-poster-wrap { position: relative; width: 100%; padding-top: 150%; overflow: hidden; background: var(--border); }
  .dc-poster-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .dc-no-poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text2); }
  .dc-tmdb-score {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.75); color: var(--gold);
    font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  .dc-info { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .dc-title { font-weight: 600; font-size: 0.85rem; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .dc-meta { font-size: 0.72rem; color: var(--text2); }
  .dc-genres { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
  .dc-genre { font-size: 0.62rem; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--text2); }
  .dc-action { margin-top: auto; padding-top: 8px; }
  .dc-action .btn { width: 100%; }
  .dc-rated-badge { text-align: center; font-size: 0.75rem; color: var(--text2); padding: 6px 0; }
  .discover-load-more { text-align: center; margin-bottom: 20px; }
  .discover-spinner { text-align: center; padding: 40px; }
  .discover-pages { display: flex; justify-content: center; gap: 4px; margin: 20px 0; align-items: center; }
  .discover-pages button {
    min-width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: var(--t);
  }

function getEntryScore(entry) {
  if (entry.type !== 'series') return entry.total_score;
  const seasons = allSeasonRatings.filter(s => s.entry_id === entry.id && s.user_id === entry.user_id);
  if (seasons.length === 0) return entry.total_score;
  return seasons.reduce((sum, se) => sum + se.total_score, 0) / seasons.length;
}

function fmtDate(d){ if(!d) return ''; const dt=new Date(d); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }

async function loadInviteCodes() {
  const {data: codes, error} = await db.from('invite_codes')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { $['inviteCodeList'].innerHTML = '<p style="color:var(--text2);font-size:0.8rem">加载失败</p>'; return; }
  const active = (codes||[]).filter(c => new Date(c.expires_at) > new Date() && c.use_count < c.max_uses);

  if (!active.length) {
    $['inviteCodeList'].innerHTML = '<p style="color:var(--text2);font-size:0.8rem">暂无有效邀请码，点击上方按钮生成</p>';
    return;
  }
  $['inviteCodeList'].innerHTML = active.map(c => {
    const remaining = Math.max(0, new Date(c.expires_at) - Date.now());
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <div>
        <code style="font-size:1rem;color:var(--gold);font-weight:700;letter-spacing:1px">${esc(c.code)}</code>
        <span style="font-size:0.7rem;color:var(--text2);margin-left:8px">剩余 ${h}小时${m}分</span>
      </div>
      <button class="btn btn-xs btn-secondary" onclick="copyInviteCode('${esc(c.code)}')" aria-label="复制邀请码">复制</button>
    </div>`;
  }).join('');
}

      title: m.title,

    };
    const {data:inserted, error} = await db.from('entries').insert(entry).select('id').single();

          });

      }

// ===== DATA LOADING (with localStorage cache) =====
const CACHE_KEY = 'filmnote_cache_';
function getCache(key) {
  try {
    const raw = localStorage.getItem(CACHE_KEY + key);
    if (!raw) return null;
    const {data, ts} = JSON.parse(raw);
    if (Date.now() - ts > 3600000) { localStorage.removeItem(CACHE_KEY + key); return null; }
    return data;
  } catch { return null; }
}
function setCache(key, data) {
  try { localStorage.setItem(CACHE_KEY + key, JSON.stringify({data, ts: Date.now()})); } catch {}
}

async function loadAllData() {
  if (!currentUser) return;
  const uid = currentUser.id;

  // 1. Try cache first for instant render
  const cachedEntries = getCache('entries_' + uid);
  const cachedSeasons = getCache('seasons_' + uid);
  const cachedPrefs = getCache('prefs_' + uid);
  if (cachedEntries) {
    allEntries = cachedEntries;
    allSeasonRatings = cachedSeasons || [];
    allProfiles = cachedPrefs || {};
    updateHeaderCount();
    renderActiveTab();
  }

  // 2. Fetch fresh data from Supabase
  try {
    const [{data:entries},{data:seasons},{data:prefs}] = await Promise.all([
      db.from('entries').select('*').order('created_at',{ascending:false}),
      db.from('season_ratings').select('*').order('season_number',{ascending:true}),
      db.from('user_preferences').select('*')
    ]);
    allEntries = entries || [];
    allSeasonRatings = seasons || [];
    allProfiles = {};
    (prefs||[]).forEach(p=>{ allProfiles[p.user_id]=p; });

    // Update cache
    setCache('entries_' + uid, allEntries);
    setCache('seasons_' + uid, allSeasonRatings);
    setCache('prefs_' + uid, allProfiles);

    updateHeaderCount();
    renderActiveTab();
  } catch(e) {
    console.error('loadAllData error:', e);
    if (!cachedEntries) toast('加载数据失败: ' + (e.message||e));
  }
}

// ===== REALTIME SYNC =====
function subscribeToRealtime() {
  if (realtimeChannel) return;
  try {
    realtimeChannel = db.channel('filmnote-changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'entries' },
        (payload) => handleRealtimeChange(payload, 'entries')
      )
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'season_ratings' },
        (payload) => handleRealtimeChange(payload, 'seasons')
      )
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'user_preferences' },
        (payload) => handleRealtimeChange(payload, 'prefs')
      )
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') console.log('Realtime: connected');
        if (status === 'CHANNEL_ERROR') { console.warn('Realtime error, retrying...'); realtimeChannel = null; setTimeout(subscribeToRealtime, 3000); }
        if (status === 'CLOSED') { realtimeChannel = null; }
      });
  } catch(e) {
    console.warn('Realtime subscription failed:', e.message);
    realtimeChannel = null;
  }
}

function handleRealtimeChange(payload, source) {
  // Skip own changes (already reflected in UI)
  const uid = payload.new?.user_id || payload.old?.user_id;
  if (uid === currentUser?.id) return;

  // Debounce rapid changes
  clearTimeout(realtimeDebounce);
  realtimeDebounce = setTimeout(() => {
    loadAllData();
  }, 800);
}

function unsubscribeRealtime() {
  if (realtimeChannel) {
    realtimeChannel.unsubscribe();
    realtimeChannel = null;
  }
  clearTimeout(realtimeDebounce);
}

      <div style="display:flex;align-items:center;gap:8px">
        <span class="season-score" id="seasonTotal-${prefix}">${calcTotal(ratings).toFixed(1)}</span>
        <button type="button" class="btn btn-xs btn-danger" onclick="removeSeason('${sidx}')" title="删除此季">✕</button>
      </div>

      </div>
    </div>
  `;
  $['seasonList'].appendChild(card);

  });

function removeSeason(idx) {
  const card = document.querySelector(`.season-card[data-season-idx="${idx}"]`);
  if (card) card.remove();
}

function collectSeasonData() {
  const seasons = [];
  document.querySelectorAll('.season-card').forEach(card=>{
    const idx = card.dataset.seasonIdx;
    const prefix = `s${idx}`;
    const numInput = card.querySelector('.season-header input[type="number"]');
    const titleInput = card.querySelector('.season-header input[type="text"]');
    const ratings = {};
    card.querySelectorAll(`input[type="range"][data-prefix="${prefix}"]`).forEach(s=>{
      ratings[s.dataset.dim] = parseInt(s.value);
    });
    const commentEl = card.querySelector('textarea');
    seasons.push({
      _idx: idx,
      season_number: parseInt(numInput?.value) || 0,
      season_title: titleInput?.value?.trim() || '',
      ratings,
      total_score: calcTotal(ratings),
      comment: commentEl?.value?.trim() || ''
    });
  });
  seasons.sort((a,b)=>a.season_number-b.season_number);
  return seasons;
}

$['addSeasonBtn'].addEventListener('click', ()=>{

  addSeasonRow({ season_number: next });
});

let tmdbTimer = null;
let tmdbAbort = null;
$['tmdbSearch'].addEventListener('input', function(){
  clearTimeout(tmdbTimer);
  const q = this.value.trim();
  if (!q) { $['searchResults'].classList.remove('open'); return; }
  tmdbTimer = setTimeout(()=>searchTmdb(q), 350);
});

async function searchTmdb(query) {
  const container = $['searchResults'];
  // Abort previous in-flight request
  if (tmdbAbort) tmdbAbort.abort();
  tmdbAbort = new AbortController();
  try {
    const type = entryType==='series' ? 'tv' : 'movie';
    const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=zh-CN`, { signal: tmdbAbort.signal });
    const data = await res.json();
    if (!data.results?.length) {
      container.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:0.85rem">无结果</div>';
      container.classList.add('open');
      return;
    }
    container.innerHTML = data.results.slice(0,8).map(r=>{
      const title = r.title || r.name;
      const year = (r.release_date||r.first_air_date||'').slice(0,4);
      const poster = r.poster_path ? posterUrl(r.poster_path) : '';
      return `
        <div class="sr-item" data-tmdb-id="${r.id}" data-title="${esc(title)}" data-year="${year}" data-poster="${r.poster_path||''}">
          ${poster ? `<img class="sr-poster" src="${poster}" alt="">` : '<div class="sr-poster"></div>'}
          <div class="sr-info">
            <div class="sr-title">${esc(title)}</div>
            <div class="sr-meta">${year||'未知'} ${r.overview ? '· '+esc(r.overview.slice(0,60))+'...' : ''}</div>
          </div>
          <span class="sr-type">${entryType==='series'?'剧集':'电影'}</span>
        </div>
      `;
    }).join('');
    container.classList.add('open');

    // Click handler
    container.querySelectorAll('.sr-item').forEach(item=>{
      item.addEventListener('click', async ()=>{
        const tmdbId = item.dataset.tmdbId;
        $['title'].value = item.dataset.title;
        $['year'].value = item.dataset.year || '';
        $['tmdbId'].value = tmdbId;
        $['posterPath'].value = item.dataset.poster;
        $['tmdbSearch'].value = '';
        container.classList.remove('open');

        // Fetch director
        try {
          const type = entryType==='series' ? 'tv' : 'movie';
          const credRes = await fetch(`https://api.themoviedb.org/3/${type}/${tmdbId}/credits?api_key=${TMDB_KEY}&language=zh-CN`);
          const credData = await credRes.json();
          let director = '';
          if (entryType==='series') {
            const creator = (credData.crew||[]).find(c=>c.job==='Director'||c.job==='Executive Producer');
            director = creator?.name || '';
          } else {
            const dir = (credData.crew||[]).find(c=>c.job==='Director');
            director = dir?.name || '';
          }
          if (director) $['director'].value = director;
        } catch(e){}
        toast('已自动填入信息');
      });
    });
  } catch(e) {
    if (e.name==='AbortError') return; // Cancelled by newer request
    container.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:0.85rem">搜索失败</div>';
    container.classList.add('open');
  }
}

$['movieForm'].addEventListener('submit', async e=>{
  e.preventDefault();
  const btn = $['submitBtn'];
  const origText = btn.textContent;
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    const title = $['title'].value.trim();
    if (!title) { toast('请填写电影名称'); btn.textContent=origText; btn.disabled=false; return; }
    if (title.length < 2 || title.length > 100) { toast('片名需 2-100 个字符'); btn.textContent=origText; btn.disabled=false; return; }
    const yearVal = parseInt($['year'].value);
    if ($['year'].value && (isNaN(yearVal) || yearVal < 1900 || yearVal > 2100)) { toast('年份需在 1900-2100 之间'); btn.textContent=origText; btn.disabled=false; return; }

    const ratings = getMainRatings();
    const entryData = {
      user_id: currentUser.id,
      type: entryType,
      tmdb_id: parseInt($['tmdbId'].value) || null,
      title,
      year: parseInt($['year'].value) || null,
      director: $['director'].value.trim(),
      poster_path: $['posterPath'].value,
      ratings,
      total_score: calcTotal(ratings),
      comment: $['comment'].value.trim(),
      updated_at: new Date().toISOString()
    };

    let entryId = editingEntryId;

    if (editingEntryId) {
      const {error: delErr} = await db.from('season_ratings').delete().eq('entry_id', editingEntryId).eq('user_id', currentUser.id);
      if (delErr) { toast('清除旧季数据失败: '+delErr.message); btn.textContent=origText; btn.disabled=false; return; }
      const {error: updateErr} = await db.from('entries').update(entryData).eq('id', editingEntryId);
      if (updateErr) { toast('更新失败: '+updateErr.message); btn.textContent=origText; btn.disabled=false; return; }
    } else {
      entryData.created_at = new Date().toISOString();
      // Verify session before insert
      const {data:{session}} = await db.auth.getSession();
      if (!session) { toast('登录已过期，请重新登录'); return; }
      // Prevent duplicate: same user rating same movie
      const dupKey = getGroupKey({tmdb_id: entryData.tmdb_id, title: entryData.title, year: entryData.year});
      if (allEntries.some(e=>e.user_id===currentUser.id && getGroupKey(e)===dupKey)) {
        toast('你已评价过该作品'); btn.textContent=origText; btn.disabled=false; return;
      }
      const {data:inserted, error: insertErr} = await db.from('entries').insert(entryData).select('id').single();
      if (insertErr) {
        toast('保存失败: '+insertErr.message+' (code:'+insertErr.code+')');
        console.error('Insert error:', insertErr);
        return;
      }
      if (!inserted) { toast('保存失败：未返回数据'); return; }
      entryId = inserted.id;
    }

    if (entryType==='series') {
      const seasons = collectSeasonData().filter(s=>s.season_number>0);
      const snums = seasons.map(s=>s.season_number);
      const dup = snums.find((n,i)=>snums.indexOf(n)!==i);
      if (dup) { toast(`季号 S${dup} 重复，请修改后再保存`); btn.textContent=origText; btn.disabled=false; return; }
      for (const s of seasons) {
        await db.from('season_ratings').insert({
          entry_id: entryId,
          user_id: currentUser.id,
          season_number: s.season_number,
          season_title: s.season_title,
          ratings: s.ratings,
          total_score: s.total_score,
          comment: s.comment,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        });
      }
    }

    toast(editingEntryId ? '评价已更新' : '评价已保存');
    highlightEntryId = entryId;
    resetForm();
    const prevSort = $['sortBy'].value;
    $['sortBy'].value = 'date-desc';
    await loadAllData();
    switchTab('list');
    setTimeout(() => { $['sortBy'].value = prevSort; }, 800);
  } catch(err) {
    toast('保存出错: ' + (err.message||err));
    console.error('Save error:', err);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
});

function renderList() {
  const container = $['movieList'];
  const empty = $['emptyState'];
  const loading = $['loadingState'];
  const query = $['searchInput'].value.toLowerCase();
  const sort = $['sortBy'].value;

  const scoreFilterVal = $['scoreFilter'].value;
  // Filter without score — score filtering happens after grouping
  let filtered = allEntries.filter(e=>{
    if (e.type!==listType) return false;
    if (ownerFilter==='me' && e.user_id!==currentUser.id) return false;
    if (query) {
      const hay = (e.title+(e.director||'')).toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  loading.classList.add('hidden');
  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  // Group entries by tmdb_id or title+year
  const groups = [];
  const seen = new Set();
  filtered.forEach(e=>{
    const gkey = getGroupKey(e);
    if (seen.has(gkey)) return;
    seen.add(gkey);
    const group = filtered.filter(f=>getGroupKey(f)===gkey);
    // Attach group average score
    group._avgScore = group.reduce((s,e)=>s+getEntryScore(e),0)/group.length;
    groups.push(group);
  });

  // Apply score filter on group averages
  let scoredGroups = groups;
  if (scoreFilterVal!=='all') {
    scoredGroups = groups.filter(g=>Math.floor(g._avgScore)===parseInt(scoreFilterVal));
  }

  if (!scoredGroups.length) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }

  // Sort groups
  scoredGroups.sort((a,b)=>{
    switch(sort) {
      case 'score-desc': return b._avgScore-a._avgScore;
      case 'score-asc': return a._avgScore-b._avgScore;
      case 'count-desc': return b.length-a.length;
      case 'date-desc': return new Date(b[0].created_at)-new Date(a[0].created_at);
      case 'date-asc': return new Date(a[0].created_at)-new Date(b[0].created_at);
      case 'title': return a[0].title.localeCompare(b[0].title,'zh');
      default: return 0;
    }
  });

  // Pagination: slice groups for current page
  const start = (listPageNum - 1) * listPageSize;
  const pageGroups = scoredGroups.slice(start, start + listPageSize);
  container.innerHTML = pageGroups.map(group=>{
    const main = group.find(e=>e.user_id===currentUser.id) || group[0];
    const others = group.filter(e=>e.user_id!==currentUser.id);
    const isMine = main.user_id===currentUser.id;
    const uniqueUsers = new Set(group.map(e=>e.user_id));
    const merged = uniqueUsers.size > 1;
    const seasonCount = main.type==='series' ? allSeasonRatings.filter(s=>s.entry_id===main.id&&s.user_id===main.user_id).length : 0;

    const dimOrder = Object.keys(WEIGHTS);
    const dimTags = (entry, uc) => dimOrder.map(dim=>
      `<span class="mc-dim-item" style="border-color:${uc.main}"><span class="dim-lab">${DIM_LABELS[dim].slice(0,2)}</span><span class="dim-val" style="color:${uc.main}">${(entry.ratings||{})[dim]||5}</span></span>`
    ).join('');

    if (merged) {
      const priv = isPrivileged();
      const currentUserInGroup = group.some(e=>e.user_id===currentUser.id);

      let scoreBadges = '';
      let dimRowsHtml = '';
      let addBtnHtml = '';

      // Helper: render one entry row
      function renderOneRow(e, showActions) {
        const uc = getUserColor(e.user_id);
        const uname = allProfiles[e.user_id]?.display_name||'未知';
        scoreBadges += `<div class="mc-score-sm mc-score-${uc.key}" title="${esc(uname)}">
          <span class="mc-score-label">${esc(uname)}</span>${getEntryScore(e).toFixed(1)}</div>`;
        let act = '';
        if (showActions) {
          act = `<div class="mc-actions" onclick="event.stopPropagation()" style="margin-left:auto">
            <button class="btn btn-sm btn-secondary" onclick="editEntry('${e.id}')" aria-label="编辑 ${esc(allProfiles[e.user_id]?.display_name||'')} 的评价">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteEntry('${e.id}')" aria-label="删除 ${esc(allProfiles[e.user_id]?.display_name||'')} 的评价">删除</button>
          </div>`;
        }
        dimRowsHtml += `<div class="mc-dim-row-user" style="display:flex;align-items:center;gap:6px;padding:2px 0">
          <span class="mc-dim-user" style="color:${uc.main}">${esc(uname)}</span><span class="mc-dim-dots">${dimTags(e,uc)}</span><span class="mc-dim-total" style="color:${uc.main}">总分 ${getEntryScore(e).toFixed(1)}</span>${act}</div>`;
      }

      // Helper: render average row for a list of entries
      function renderAvgRow(entries) {
        const avgTotal = entries.reduce((s,e)=>s+getEntryScore(e),0)/entries.length;
        const avgDims = {};
        for (const dim of Object.keys(WEIGHTS)) {
          avgDims[dim] = Math.round(entries.reduce((s,e)=>s+(e.ratings[dim]||5),0)/entries.length);
        }
        scoreBadges += `<div class="mc-score-sm mc-score-friend" title="平均">
          <span class="mc-score-label">平均</span>${avgTotal.toFixed(1)}</div>`;
        dimRowsHtml += `<div class="mc-dim-row-user" style="display:flex;align-items:center;gap:6px;padding:2px 0">
          <span class="mc-dim-user" style="color:var(--friend)">平均</span><span class="mc-dim-dots">${dimTags({ratings:avgDims},{key:'friend'})}</span><span class="mc-dim-total" style="color:var(--friend)">总分 ${avgTotal.toFixed(1)}</span></div>`;
      }

      if (priv) {
        // Fank1ng/ceci: own row + other privileged + average of rest
        const myEntry = group.find(e=>e.user_id===currentUser.id);
        const otherPriv = group.find(e=>{
          const n=getUserName(e.user_id);
          return (n==='fank1ng'||n==='ceci') && e.user_id!==currentUser.id;
        });
        const rest = group.filter(e=>{
          const n=getUserName(e.user_id);
          return n!=='fank1ng' && n!=='ceci' && e.user_id!==currentUser.id;
        });

        if (myEntry) renderOneRow(myEntry, true);
        if (otherPriv) renderOneRow(otherPriv, false);
        if (rest.length > 0) renderAvgRow(rest);
        if (!currentUserInGroup && rest.length > 0) {
          addBtnHtml = `<div style="text-align:right;padding-top:4px"><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();addMyRating('${rest[0].id}')" aria-label="添加我的评分">＋我的评分</button></div>`;
        }
      } else {
        // Other user: self + Fank1ng + ceci
        const myEntry = group.find(e=>e.user_id===currentUser.id);
        const fank1ngEntry = group.find(e=>getUserName(e.user_id)==='fank1ng');
        const ceciEntry = group.find(e=>getUserName(e.user_id)==='ceci');

        if (myEntry) renderOneRow(myEntry, true);
        if (fank1ngEntry && fank1ngEntry.user_id!==currentUser.id) renderOneRow(fank1ngEntry, false);
        if (ceciEntry && ceciEntry.user_id!==currentUser.id) renderOneRow(ceciEntry, false);
        // Fallback: if no self/Fank1ng/ceci, show all other users
        const anyPrivileged = myEntry || (fank1ngEntry && fank1ngEntry.user_id!==currentUser.id) || (ceciEntry && ceciEntry.user_id!==currentUser.id);
        if (!anyPrivileged) {
          group.filter(e=>e.user_id!==currentUser.id).forEach(e => renderOneRow(e, false));
        }
        if (!currentUserInGroup) {
          const anyNonMe = group.find(e=>e.user_id!==currentUser.id);
          if (anyNonMe) addBtnHtml = `<div style="text-align:right;padding-top:4px"><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();addMyRating('${anyNonMe.id}')" aria-label="添加我的评分">＋我的评分</button></div>`;
        }
      }

      let cardActionsHtml = '';
      const myEntryInGroup = group.find(e=>e.user_id===currentUser.id);
      if (myEntryInGroup) {
        cardActionsHtml = `<div class="mc-actions-mobile" onclick="event.stopPropagation()"><button class="btn btn-sm btn-secondary" onclick="editEntry('${myEntryInGroup.id}')" aria-label="编辑我的评价">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteEntry('${myEntryInGroup.id}')" aria-label="删除我的评价">删除</button></div>`;
      } else {
        const firstOther = group.find(e=>e.user_id!==currentUser.id);
        if (firstOther) cardActionsHtml = `<div class="mc-actions-mobile" onclick="event.stopPropagation()"><button class="btn btn-sm btn-secondary" onclick="addMyRating('${firstOther.id}')" aria-label="添加我的评分">＋我的评分</button></div>`;
      }

      return `
        <div class="movie-card" id="entry-${main.id}" onclick="showDetail('${main.id}')" aria-label="${esc(main.title)} — ${group.map(e=>allProfiles[e.user_id]?.display_name||'?').join('、')}">
          ${main.poster_path ? `<img class="mc-poster" src="${posterUrl(main.poster_path)}" alt="">` : '<div class="mc-poster"></div>'}
          <div class="mc-scores-compare" style="flex-wrap:wrap;gap:8px">${scoreBadges}</div>
          <div class="mc-info">
            <div class="mc-title">
              ${esc(main.title)}
              ${main.year ? '<span style="color:var(--text2);font-weight:400">('+main.year+')</span>':''}
              ${main.type==='series' ? '<span style="font-size:0.7rem;color:var(--gold)"> 剧集</span>' : ''}
            </div>
            <div class="mc-meta">
              ${main.director ? esc(main.director)+' · ':''}${fmtDate(main.created_at)}
              ${seasonCount>0 ? `<span class="mc-season-badge">S1-S${seasonCount}</span>` : ''}
            </div>
            <div class="mc-dim-scores" style="flex-direction:column;gap:2px">
              ${dimRowsHtml}
              ${addBtnHtml}
            </div>
          </div>
          ${cardActionsHtml}
        </div>
      `;
    } else {
      // Single entry
      const ownerName = allProfiles[main.user_id]?.display_name||'未知';
      return `
        <div class="movie-card" id="entry-${main.id}" onclick="showDetail('${main.id}')" aria-label="${esc(main.title)} - ${esc(ownerName)} ${getEntryScore(main).toFixed(1)}分">
          ${main.poster_path ? `<img class="mc-poster" src="${posterUrl(main.poster_path)}" alt="">` : '<div class="mc-poster"></div>'}
          <div class="mc-scores-compare"><div class="mc-score" style="border-color:${getUserColor(main.user_id).main};background:${getUserColor(main.user_id).dim};color:${getUserColor(main.user_id).main}">${getEntryScore(main).toFixed(1)}</div></div>
          <div class="mc-info">
            <div class="mc-title">
              ${esc(main.title)}
              ${main.year ? '<span style="color:var(--text2);font-weight:400">('+main.year+')</span>':''}
              ${main.type==='series' ? '<span style="font-size:0.7rem;color:var(--gold)"> 剧集</span>' : ''}
            </div>
            <div class="mc-meta">
              ${main.director ? esc(main.director)+' · ':''}${fmtDate(main.created_at)}
              ${!isMine ? `<span class="mc-owner" style="color:${getUserColor(main.user_id).main};background:${getUserColor(main.user_id).dim}">${esc(ownerName)}</span>` : ''}
              ${seasonCount>0 ? `<span class="mc-season-badge">S1-S${seasonCount}</span>` : ''}
            </div>
            <div class="mc-dim-scores">
              <span class="mc-dim-user" style="color:${getUserColor(main.user_id).main}">${esc(ownerName)}</span>
              <span class="mc-dim-dots">${dimOrder.map(dim=>`<span class="mc-dim-item" style="border-color:${getUserColor(main.user_id).main}"><span class="dim-lab">${DIM_LABELS[dim].slice(0,2)}</span><span class="dim-val" style="color:${getUserColor(main.user_id).main}">${(main.ratings||{})[dim]||5}</span></span>`).join('')}</span>
              <span class="mc-dim-total" style="color:${getUserColor(main.user_id).main}">总分 ${getEntryScore(main).toFixed(1)}</span>
            </div>
            ${main.comment ? `<div class="mc-comment">${esc(main.comment)}</div>` : ''}
          </div>
          ${isMine ? `
          <div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="editEntry('${main.id}')" aria-label="编辑 ${esc(ownerName)} 的评价">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteEntry('${main.id}')" aria-label="删除 ${esc(ownerName)} 的评价">删除</button>
          </div>` : `
          <div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="addMyRating('${main.id}')" aria-label="添加我对 ${esc(main.title)} 的评分">＋我的评分</button>
          </div>`}
        </div>
      `;
    }
  }).join('');
  // Pagination
  const totalPages = Math.ceil(scoredGroups.length / listPageSize);
  if (totalPages > 1) {
    let pagesHtml = '';
    let pageNums = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) pageNums.push(i);
    } else {
      pageNums.push(1);
      if (listPageNum > 3) pageNums.push('...');
      for (let i = Math.max(2, listPageNum - 1); i <= Math.min(totalPages - 1, listPageNum + 1); i++) {
        pageNums.push(i);
      }
      if (listPageNum < totalPages - 2) pageNums.push('...');
      pageNums.push(totalPages);
    }
    if (listPageNum > 1) {
      pagesHtml += `<button class="btn btn-sm btn-secondary" onclick="listPageNum--;renderList();window.scrollTo({top:0,behavior:'smooth'})">‹ 上一页</button>`;
    }
    pageNums.forEach(p => {
      if (p === '...') {
        pagesHtml += '<span style="color:var(--text2);padding:0 6px">…</span>';
      } else if (p === listPageNum) {
        pagesHtml += `<button class="btn btn-sm" style="background:var(--gold);color:#000;font-weight:700;min-width:32px">${p}</button>`;
      } else {
        pagesHtml += `<button class="btn btn-sm btn-secondary" onclick="listPageNum=${p};renderList();window.scrollTo({top:0,behavior:'smooth'})" style="min-width:32px">${p}</button>`;
      }
    });
    if (listPageNum < totalPages) {
      pagesHtml += `<button class="btn btn-sm btn-secondary" onclick="listPageNum++;renderList();window.scrollTo({top:0,behavior:'smooth'})">下一页 ›</button>`;
    }
    container.innerHTML += `<div style="text-align:center;padding:16px;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap">${pagesHtml}</div>`;
  }
}

// ===== STATS =====
let statsFilter = 'me';
let statsType = 'all';
let statsOtherUser = null;

document.querySelectorAll('#statsFilter button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#statsFilter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsFilter = btn.dataset.sf;
    renderStats();
  });
});

document.querySelectorAll('#statsTypeFilter button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#statsTypeFilter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsType = btn.dataset.st;
    renderStats();
  });
});

$['statsUserPicker'].addEventListener('change', function(){
  statsOtherUser = this.value || null;
  renderStats();
});

function calcStats(entries) {
  if (!entries.length) return null;
  const avgTotal = entries.reduce((s,m)=>s+getEntryScore(m),0)/entries.length;
  const best = entries.reduce((a,b)=>getEntryScore(a)>getEntryScore(b)?a:b);
  const worst = entries.reduce((a,b)=>getEntryScore(a)<getEntryScore(b)?a:b);
  const movies = entries.filter(e=>e.type==='movie').length;
  const series = entries.filter(e=>e.type==='series').length;
  const dimAvgs = {};
  for (const dim of Object.keys(WEIGHTS)) {
    dimAvgs[dim] = entries.reduce((s,m)=>s+(m.ratings[dim]||5),0)/entries.length;
  }
  const dist = new Array(10).fill(0);
  entries.forEach(m=>{ const b=Math.min(Math.floor(getEntryScore(m))-1,9); if(b>=0) dist[b]++; });
  return { avgTotal, best, worst, movies, series, dimAvgs, dist, count: entries.length };
}

function renderStatCards(stats, c) {
  if (!stats) return '<div class="stat-card"><div class="stat-value">-</div><div class="stat-label">无数据</div></div>';
  const mc = c?.main||'#d4a853';
  return `
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${stats.avgTotal.toFixed(1)}</div><div class="stat-label">平均分</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${stats.movies}</div><div class="stat-label">电影</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${stats.series}</div><div class="stat-label">剧集</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${getEntryScore(stats.best).toFixed(1)}</div><div class="stat-label">最高分 · ${esc(stats.best.title.slice(0,8))}</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${getEntryScore(stats.worst).toFixed(1)}</div><div class="stat-label">最低分 · ${esc(stats.worst.title.slice(0,8))}</div></div>
  `;
}

function renderDimBars(dimAvgs, c) {
  const mc = c?.main||'#d4a853';
  return Object.entries(dimAvgs).map(([dim,avg])=>`
    <div class="stat-bar-row">
      <span class="stat-bar-label">${DIM_LABELS[dim]}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(avg/10)*100}%;background:${mc}"></div></div>
      <span class="stat-bar-value">${avg.toFixed(1)}</span>
    </div>
  `).join('');
}

function renderDist(dist, c) {
  const maxDist = Math.max(...dist,1);
  const mc = c?.main||'#d4a853';
  return dist.map((c2,i)=>`
    <div class="score-dist-bar">
      <span class="score-dist-count" style="color:${mc}">${c2||''}</span>
      ${c2?`<div class="score-dist-fill" style="height:${Math.max((c2/maxDist)*100,4)}%;background:${mc}"></div>`:''}
      <span class="score-dist-label">${i+1}分</span>
    </div>
  `).join('');
}

function filterByType(entries) {
  if (statsType==='all') return entries;
  return entries.filter(e=>e.type===statsType);
}

function renderStats() {
  const container = $['statsContent'];
  const userRow = document.getElementById('statsUserRow');
  const userPicker = $['statsUserPicker'];

  // Show/hide user picker for "others" and "compare" filters
  if (statsFilter==='others' || statsFilter==='compare') {
    userRow.style.display = '';
    const otherUsers = [...new Set(allEntries.filter(e=>e.user_id!==currentUser.id).map(e=>e.user_id))];
    const currentVal = userPicker.value;
    userPicker.innerHTML = '<option value="">所有他人</option>' + otherUsers.map(uid=>{
      const name = allProfiles[uid]?.display_name||uid.slice(0,8);
      return `<option value="${uid}"${currentVal===uid?' selected':''}>${esc(name)}</option>`;
    }).join('');
    if (!otherUsers.length) userRow.style.display = 'none';
  } else {
    userRow.style.display = 'none';
    statsOtherUser = null;
  }

  if (allEntries.length===0) {
    container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>';
    return;
  }

  const myEntries = filterByType(allEntries.filter(e=>e.user_id===currentUser.id));

  let otherEntries;
  if (statsOtherUser) {
    otherEntries = filterByType(allEntries.filter(e=>e.user_id===statsOtherUser));
  } else {
    otherEntries = filterByType(allEntries.filter(e=>e.user_id!==currentUser.id));
  }

  const myStats = calcStats(myEntries);
  const otherStats = calcStats(otherEntries);

  const myColor = getUserColor(currentUser.id);
  const otherColor = statsOtherUser ? getUserColor(statsOtherUser) : { key:'friend', main:'#5b9db0', dim:'#1a2a30' };

  const typeLabel = statsType==='movie'?'电影':(statsType==='series'?'剧集':'');
  const typeSuffix = typeLabel ? ` · ${typeLabel}` : '';

  let html = '';

  if (statsFilter==='me') {
    if (!myStats) { container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>'; return; }
    html += `<div class="stats-grid">${renderStatCards(myStats, myColor)}</div>
      <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分${typeSuffix}</h3>
      ${renderDimBars(myStats.dimAvgs, myColor)}
      <h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布${typeSuffix}</h3>
      <div class="score-dist">${renderDist(myStats.dist, myColor)}</div>`;

  } else if (statsFilter==='others') {
    if (!otherStats) { container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>'; return; }
    const otherName = statsOtherUser ? (allProfiles[statsOtherUser]?.display_name||'用户') : '所有他人';
    html += `<h3 style="margin-bottom:14px;font-size:0.9rem;color:${otherColor.main}">${esc(otherName)}${typeSuffix}</h3>
      <div class="stats-grid">${renderStatCards(otherStats, otherColor)}</div>
      <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分</h3>
      ${renderDimBars(otherStats.dimAvgs, otherColor)}
      <h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布</h3>
      <div class="score-dist">${renderDist(otherStats.dist, otherColor)}</div>`;

  } else if (statsFilter==='compare') {
    const myName = currentProfile?.display_name||'我';
    const otherLabel = statsOtherUser ? (allProfiles[statsOtherUser]?.display_name||'对方') : (otherEntries.length>1?'平均':(otherEntries.length>0?allProfiles[otherEntries[0].user_id]?.display_name||'对方':'对方'));
    html += `<div class="stats-grid">
      <div class="stat-card"><div class="stat-value" style="color:${myColor.main}">${myStats?myStats.avgTotal.toFixed(1):'-'}</div><div class="stat-label">${esc(myName)}均分${typeSuffix}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${otherColor.main}">${otherStats?otherStats.avgTotal.toFixed(1):'-'}</div><div class="stat-label">${esc(otherLabel)}均分${typeSuffix}</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.movies:0}/${otherStats?otherStats.movies:0}</div><div class="stat-label">电影 (我/${esc(otherLabel)})</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.series:0}/${otherStats?otherStats.series:0}</div><div class="stat-label">剧集 (我/${esc(otherLabel)})</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.count:0}/${otherStats?otherStats.count:0}</div><div class="stat-label">总计 (我/${esc(otherLabel)})</div></div>
    </div>
    <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分对比 <span style="font-size:0.75rem"><span style="color:${myColor.main}">${esc(myName)}</span> / <span style="color:${otherColor.main}">${esc(otherLabel)}</span></span></h3>`;
    for (const dim of Object.keys(WEIGHTS)) {
      const mv = myStats?myStats.dimAvgs[dim]:0;
      const ov = otherStats?otherStats.dimAvgs[dim]:0;
      html += `<div class="stat-compare-row">
        <span class="stat-compare-label">${DIM_LABELS[dim]}</span>
        <div class="stat-compare-bars">
          <div style="height:7px;border-radius:3px;background:${myColor.main};width:${(mv/10)*100}%"></div>
          <div style="height:7px;border-radius:3px;background:${otherColor.main};width:${(ov/10)*100}%"></div>
        </div>
        <div class="stat-compare-values">

          <span style="color:${otherColor.main}">${ov.toFixed(1)}</span>
        </div>
      </div>`;
    }
    html += `<h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布对比</h3>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.65rem">

    <div class="compare-dist">

        const maxAll = Math.max(...(myStats?myStats.dist:[]),...(otherStats?otherStats.dist:[]),1);
        return `<div class="cd-bar-group">
          <div class="cd-bars">
            ${c?`<div class="cd-bar" style="height:${Math.max((c/maxAll)*100,4)}%;background:${myColor.main}"><span class="cd-count">${c}</span></div>`:''}
            ${oc?`<div class="cd-bar" style="height:${Math.max((oc/maxAll)*100,4)}%;background:${otherColor.main}"><span class="cd-count">${oc}</span></div>`:''}
          </div>
          <span class="cd-label">${i+1}分</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  container.innerHTML = html;
}

// ===== DISCOVER =====
let discoverTab = 'recommend';
let discoverPage = { recommend: 1, toprated: 1 };
let discoverCache = { recommend: null, week: null, toprated: null };
let discoverVisitCount = { recommend: 0 };
let topratedFilterUnwatched = false;
let discoverMovieMap = {};
let quickRateMovie = null;

document.querySelectorAll('#discoverSubtabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#discoverSubtabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    discoverTab = btn.dataset.dt;
    renderDiscover();
  });
});

// Delegated click for +我的评分 buttons in discover grid
$['discoverContent'].addEventListener('click', e=>{
  const btn = e.target.closest('.dc-rate-btn');
  if (!btn) return;
  const tmdbId = parseInt(btn.dataset.tmdbId);
  const movie = discoverMovieMap[tmdbId];
  if (movie) openQuickRate(movie);
});

async function renderDiscover() {
  const container = $['discoverContent'];
  container.innerHTML = '<div class="discover-spinner"><div class="spinner"></div></div>';

  let movies = [];
  try {
    if (discoverTab === 'recommend') {
      movies = await loadRecommendations();
    } else if (discoverTab === 'week') {
      movies = await loadTrending();
    } else {
      movies = await loadTopRated();
    }
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><p>加载失败，请稍后重试</p></div>';
    return;
  }

  if (movies === null) {
    container.innerHTML = `<div class="empty-state"><p style="font-size:2rem">🎬</p><p>评价 ${25} 部以上电影后</p><p>Ceci 会为你生成个性化推荐</p><p style="font-size:0.8rem;color:var(--text2);margin-top:8px">当前已评价 ${allEntries.filter(e=>e.user_id===currentUser.id && e.type==='movie').length} 部</p></div>`;
    return;
  }
  if (!movies.length) {
    container.innerHTML = '<div class="empty-state"><p>暂无推荐，试试热门标签吧</p></div>';
    return;
  }

  // Build lookup map
  discoverMovieMap = {};
  movies.forEach(m=>{ if(m.tmdb_id) discoverMovieMap[m.tmdb_id]=m; });

  const ratedTmdbIds = new Set(allEntries.filter(e=>e.tmdb_id).map(e=>'tmdb_'+e.tmdb_id));

  // ── Week: show all 32, no pagination ──
  if (discoverTab === 'week') {
    container.innerHTML = `
      <div class="discover-topbar"><span class="topbar-count">共 ${movies.length} 部</span></div>
      <div class="discover-grid">
        ${movies.map(m=>renderDiscoverCard(m, ratedTmdbIds)).join('')}
      </div>
    `;
    return;
  }

  // ── TopRated: default show full list + toggle filter ──
  if (discoverTab === 'toprated') {
    const filteredMovies = topratedFilterUnwatched ? movies.filter(m=>!ratedTmdbIds.has('tmdb_'+m.id)) : movies;
    const page = discoverPage.toprated || 1;
    const pageSize = 20;
    const totalPages = Math.ceil(filteredMovies.length / pageSize);
    const start = (page-1)*pageSize;
    const pageMovies = filteredMovies.slice(start, start+pageSize);

    container.innerHTML = `
      <div class="discover-topbar">
        <span class="topbar-count">${topratedFilterUnwatched ? '未看 ' : '共 '}${filteredMovies.length} 部</span>
        <button class="toggle-pill ${topratedFilterUnwatched?'active':''}" id="topratedToggle">只看未看</button>
      </div>
      <div class="discover-grid">
        ${pageMovies.map(m=>renderDiscoverCard(m, ratedTmdbIds)).join('')}
      </div>
      ${filteredMovies.length ? renderPagination(page, totalPages) : '<div class="empty-state"><p>全部已看过</p></div>'}
    `;

    const toggleBtn = document.getElementById('topratedToggle');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', ()=>{
        topratedFilterUnwatched = !topratedFilterUnwatched;
        discoverPage.toprated = 1;
        renderDiscover();
      });
    }
    bindPagination(page, totalPages);
    return;
  }

  // ── Recommend: 3-page pagination ──
  const page = discoverPage.recommend || 1;
  const pageSize = 20;
  const totalPages = 3; // fixed 3 pages max (60 movies)
  const start = (page-1)*pageSize;
  const pageMovies = movies.slice(start, start+pageSize);

  container.innerHTML = `
    <div class="discover-grid">
      ${pageMovies.map(m=>renderDiscoverCard(m, ratedTmdbIds)).join('')}
    </div>
    ${renderPagination(page, totalPages)}
  `;
  bindPagination(page, totalPages);
}

function renderPagination(page, totalPages) {
  if (totalPages <= 1) return '';
  let html = '<div class="discover-pages">';
  html += `<button data-pg="${page-1}" ${page<=1?'disabled':''}>◀</button>`;
  for (let i=1; i<=totalPages; i++) {
    html += `<button data-pg="${i}" class="${i===page?'active':''}">${i}</button>`;
  }
  html += `<button data-pg="${page+1}" ${page>=totalPages?'disabled':''}>▶</button>`;
  html += '</div>';
  return html;
}

function bindPagination(page, totalPages) {
  document.querySelectorAll('.discover-pages button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const pg = parseInt(btn.dataset.pg);
      if (isNaN(pg) || pg<1 || pg>totalPages) return;
      discoverPage[discoverTab] = pg;
      renderDiscover();
      window.scrollTo({top: ($['discoverContent'].offsetTop||0)-80, behavior: 'smooth'});
    });
  });
}

function renderDiscoverCard(m, ratedTmdbIds) {
  const key = m.tmdb_id ? 'tmdb_'+m.tmdb_id : '';
  const isRated = key && ratedTmdbIds.has(key);
  const poster = m.poster_path ? posterUrl(m.poster_path) : '';
  const year = (m.release_date||'').slice(0,4);
  const genres = (m.genre_ids||[]).slice(0,3).map(id=>genreMap[id]||'').filter(Boolean);

  return `
    <div class="discover-card">
      <div class="dc-poster-wrap">
        ${poster ? `<img src="${poster}" alt="${esc(m.title)}" loading="lazy">` : '<div class="dc-no-poster">🎬</div>'}
        ${m.vote_average ? `<span class="dc-tmdb-score">⭐ ${m.vote_average.toFixed(1)}</span>` : ''}
      </div>
      <div class="dc-info">
        <div class="dc-title">${esc(m.title)}</div>
        <div class="dc-meta">${year||'未知'}${m.original_language ? ' · ' + m.original_language.toUpperCase() : ''}</div>
        ${genres.length ? `<div class="dc-genres">${genres.map(g=>`<span class="dc-genre">${g}</span>`).join('')}</div>` : ''}
        <div class="dc-action">
          ${isRated ? '<div class="dc-rated-badge">已评价 ✓</div>' : `<button class="btn btn-sm btn-secondary dc-rate-btn" data-tmdb-id="${m.tmdb_id}">＋我的评分</button>`}
        </div>
      </div>
    </div>
  `;
}

// Genre map (TMDB genre IDs → Chinese)
const genreMap = {
  28:'动作',12:'冒险',16:'动画',35:'喜剧',80:'犯罪',99:'纪录',18:'剧情',10751:'家庭',
  14:'奇幻',36:'历史',27:'恐怖',10402:'音乐',9648:'悬疑',10749:'爱情',878:'科幻',
  10770:'电视电影',53:'惊悚',10752:'战争',37:'西部'
};

async function loadRecommendations() {
  if (discoverCache.recommend) return discoverCache.recommend;

  const myMovies = allEntries.filter(e=>e.user_id===currentUser.id && e.tmdb_id && e.type==='movie');
  const totalRated = allEntries.filter(e=>e.user_id===currentUser.id && e.type==='movie').length;
  const minRated = 25;

  if (totalRated < minRated) {
    discoverCache.recommend = null;
    return null;
  }

  const scored = myMovies.map(e=>({...e, score: getEntryScore(e)})).sort((a,b)=>b.score-a.score);
  if (!scored.length) { discoverCache.recommend = []; return []; }

  // ── Seed selection: 3 high-score + 2 random mid-score ──
  const highScore = scored.filter(e=>e.score>=8).slice(0,3);
  const midScore = scored.filter(e=>e.score>=6&&e.score<8);
  // Weighted random: bias toward higher scores within mid-range
  const shuffled = [...midScore].sort(()=>Math.random()-0.5);
  const randomPicks = shuffled.slice(0,2);
  const seeds = [...highScore, ...randomPicks];
  // Shuffle seeds so doesn't matter order
  seeds.sort(()=>Math.random()-0.5);

  // ── Fetch genre info for seed movies (parallel) ──
  const seedGenres = {};
  await Promise.all(seeds.map(async seed=>{
    try {
      const r = await fetch(`https://api.themoviedb.org/3/movie/${seed.tmdb_id}?api_key=${TMDB_KEY}&language=zh-CN`);
      const d = await r.json();
      seedGenres[seed.tmdb_id] = (d.genres||[]).map(g=>g.id);
      // Attach to seed for later use
      seed._fetchedGenres = seedGenres[seed.tmdb_id];
    } catch(e){ seed._fetchedGenres = []; }
  }));
  // Aggregate all genre IDs across seeds as user's genre signature
  const userGenreSig = new Set();
  Object.values(seedGenres).forEach(arr=>arr.forEach(g=>userGenreSig.add(g)));

  // ── 3-route candidate collection ──
  const allRecs = [];
  const seen = new Set();
  const ratedKeys = new Set(allEntries.filter(e=>e.tmdb_id).map(e=>'tmdb_'+e.tmdb_id));
  const addRecs = (results, sourceEntry) => {
    for (const r of results) {
      const key = 'tmdb_'+r.id;
      if (seen.has(key) || ratedKeys.has(key)) continue;
      seen.add(key);
      r._sourceScore = sourceEntry ? sourceEntry.score : 0;
      r._sourceGenres = sourceEntry ? (sourceEntry._fetchedGenres||sourceEntry.genre_ids||[]) : [];
      allRecs.push(r);
    }
  };

  for (const seed of seeds) {
    // Route 1: recommendations
    try {
      const r1 = await fetch(`https://api.themoviedb.org/3/movie/${seed.tmdb_id}/recommendations?api_key=${TMDB_KEY}&language=zh-CN&page=1`);
      const d1 = await r1.json();
      if (d1.results) addRecs(d1.results, seed);
    } catch(e){}
    // Route 2: similar
    try {
      const r2 = await fetch(`https://api.themoviedb.org/3/movie/${seed.tmdb_id}/similar?api_key=${TMDB_KEY}&language=zh-CN&page=1`);
      const d2 = await r2.json();
      if (d2.results) addRecs(d2.results, seed);
    } catch(e){}
  }

  // Route 3: genre-based discovery
  // Determine user's top genres from all rated movies' genre_ids
  const allGenreVotes = {};
  // We don't have genre_ids stored per entry, so instead fetch top-rated seeds' genres
  // and use them as basis. Alternatively: use the fact that TMDB returns genre_ids with search/results.
  // For simplicity: use a broad discover. A future enhancement can store genre_ids on entries.
  try {
    const dRes = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&language=zh-CN&sort_by=vote_average.desc&vote_count.gte=200&page=1`);
    const dData = await dRes.json();
    if (dData.results) addRecs(dData.results, null);
  } catch(e){}

  if (!allRecs.length) { discoverCache.recommend = []; return []; }

  // ── Exploration: every 3rd visit, inject 20% unseen-genre films ──
  discoverVisitCount.recommend = (discoverVisitCount.recommend||0)+1;
  if (discoverVisitCount.recommend % 3 === 0) {
    // Boost films with genres outside user's comfort zone
    allRecs.forEach(r=>{
      const recGenres = r.genre_ids||[];
      r._exploreBonus = recGenres.some(g=>!userGenreSig.has(g)) ? 0.3 : 0;
    });
  }

  // ── Multi-factor scoring ──
  const maxPop = Math.max(...allRecs.map(r=>r.popularity||0), 1);
  const maxVote = Math.max(...allRecs.map(r=>r.vote_average||0), 1);
  const now = new Date();

  allRecs.forEach(r=>{
    const voteNorm = (r.vote_average||0)/maxVote;
    const popNorm = (r.popularity||0)/maxPop;
    const releaseYear = parseInt((r.release_date||'').slice(0,4))||0;
    const ageYears = releaseYear ? now.getFullYear()-releaseYear : 10;
    const freshnessBonus = ageYears <= 2 ? 1 : ageYears <= 5 ? 0.7 : ageYears <= 10 ? 0.35 : 0;
    const sourceScoreNorm = (r._sourceScore||5)/10;
    const exploreBonus = r._exploreBonus||0;

    // Genre match: how many genres overlap with source movie
    let genreMatch = 0;
    if (r._sourceGenres && r._sourceGenres.length && r.genre_ids) {
      const srcSet = new Set(r._sourceGenres);
      const matchCount = r.genre_ids.filter(g=>srcSet.has(g)).length;
      genreMatch = Math.min(matchCount/(r._sourceGenres.length||1), 1);
    }

    r._score =
      0.25 * voteNorm +
      0.20 * sourceScoreNorm +
      0.40 * genreMatch +
      0.10 * popNorm +
      0.05 * freshnessBonus +
      exploreBonus;
  });

  // Sort by computed score
  allRecs.sort((a,b)=>b._score-a._score);
  discoverCache.recommend = allRecs.slice(0, 60);
  return discoverCache.recommend;
}

async function loadTrending() {
  if (discoverCache.week) return discoverCache.week;

  const ratedKeys = new Set(allEntries.filter(e=>e.tmdb_id).map(e=>'tmdb_'+e.tmdb_id));
  try {
    const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}&language=zh-CN`);
    const data = await res.json();
    const results = (data.results||[]).filter(r=>!ratedKeys.has('tmdb_'+r.id));
    discoverCache.week = results.slice(0, 32);
    return discoverCache.week;
  } catch(e) { return []; }
}

async function loadTopRated() {
  if (discoverCache.toprated) return discoverCache.toprated;

  const results = [];
  try {
    for (let page=1; page<=3; page++) {
      const res = await fetch(`https://api.themoviedb.org/3/movie/top_rated?api_key=${TMDB_KEY}&language=zh-CN&page=${page}`);
      const data = await res.json();
      if (data.results) {
        data.results.forEach(r=>{
          if ((r.vote_count||0)>=500) results.push(r);
        });
      }
    }
  } catch(e) { return []; }

  discoverCache.toprated = results.slice(0, 100);
  return discoverCache.toprated;
}

// ===== QUICK RATE =====
function openQuickRate(movie) {
  quickRateMovie = { tmdb_id: movie.tmdb_id, title: movie.title, year: (movie.release_date||'').slice(0,4)||null, poster_path: movie.poster_path };
  $['qrTitle'].textContent = '评价 ' + movie.title;
  $['qrDims'].innerHTML = buildDimSliders('qr', {});
  $['qrTotalScore'].textContent = '5.0';
  $['qrComment'].value = '';
  bindDimSliders('qr');
  updateQrTotal();
  $['quickRateModal'].classList.add('open');
}

function updateQrTotal() {
  const ratings = {};
  document.querySelectorAll('input[type="range"][data-prefix="qr"]').forEach(s=>{
    ratings[s.dataset.dim] = parseInt(s.value);
  });
  $['qrTotalScore'].textContent = calcTotal(ratings).toFixed(1);
}

// Hook QR slider changes to update total
document.addEventListener('input', e=>{
  if (e.target.matches('input[type="range"][data-prefix="qr"]')) updateQrTotal();
});

$['qrCancel'].addEventListener('click', ()=>{
  $['quickRateModal'].classList.remove('open');
  quickRateMovie = null;
});

$['quickRateModal'].addEventListener('click', e=>{
  if (e.target===e.currentTarget) { $['quickRateModal'].classList.remove('open'); quickRateMovie = null; }
});

$['qrSubmit'].addEventListener('click', async ()=>{
  if (!quickRateMovie) return;
  const ratings = {};
  document.querySelectorAll('input[type="range"][data-prefix="qr"]').forEach(s=>{
    ratings[s.dataset.dim] = parseInt(s.value);
  });
  const comment = $['qrComment'].value.trim();
  const total = calcTotal(ratings);

  // Duplicate check
  const dupKey = getGroupKey({tmdb_id: quickRateMovie.tmdb_id, title: quickRateMovie.title, year: quickRateMovie.year});
  if (allEntries.some(e=>e.user_id===currentUser.id && getGroupKey(e)===dupKey)) {
    toast('你已评价过该作品');
    return;
  }

  const btn = $['qrSubmit'];
  const origText = btn.textContent;
  btn.textContent = '保存中...'; btn.disabled = true;

  const entryData = {
    user_id: currentUser.id,
    type: 'movie',
    tmdb_id: quickRateMovie.tmdb_id || null,
    title: quickRateMovie.title,
    year: quickRateMovie.year || null,
    poster_path: quickRateMovie.poster_path || '',
    ratings,
    total_score: total,
    comment,
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  const {error} = await db.from('entries').insert(entryData);
  if (error) {
    toast('保存失败: ' + error.message);
    btn.textContent = origText; btn.disabled = false;
    return;
  }

  toast('评价已保存！');
  $['quickRateModal'].classList.remove('open');
  quickRateMovie = null;
  btn.textContent = origText; btn.disabled = false;
  await loadAllData();
  discoverCache = { recommend: null, week: null, toprated: null };
  renderDiscover();
});

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('nav button').forEach(b=>{ b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tabBtn = document.querySelector(`nav button[data-tab="${name}"]`);
  if (tabBtn) { tabBtn.classList.add('active'); tabBtn.setAttribute('aria-selected','true'); }
  document.getElementById(`panel-${name}`)?.classList.add('active');
  if (name==='list') { listPageNum = 1; renderList(); scrollToHighlight(); }
  if (name==='stats') { renderStats(); }
  if (name==='discover') { renderDiscover(); }
}

function scrollToHighlight() {
  if (!highlightEntryId) return;
  setTimeout(() => {
    const el = document.getElementById('entry-' + highlightEntryId);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.boxShadow = '0 0 0 3px var(--gold)';
      setTimeout(() => { el.style.boxShadow = ''; }, 2000);
    }
    highlightEntryId = null;
  }, 100);
}
document.querySelectorAll('nav button').forEach(btn=>{ btn.addEventListener('click', ()=>switchTab(btn.dataset.tab)); });

// ===== EXPORT / IMPORT =====
$['exportBtn'].addEventListener('click', async ()=>{
  const data = {
    entries: allEntries.filter(e=>e.user_id===currentUser.id),
    season_ratings: allSeasonRatings.filter(s=>s.user_id===currentUser.id),
    exported_at: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`filmnote-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
});

$['importBtn'].addEventListener('click', ()=>{
  $['importFile'].click();
});

$['importFile'].addEventListener('change', async e=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev=>{
    try {
      const data = JSON.parse(ev.target.result);
      const entries = data.entries || data; // support both formats
      if (!Array.isArray(entries)) throw new Error('格式错误');
      if (!confirm(`将导入 ${entries.length} 条记录，确认？`)) return;

      let count=0;
      for (const m of entries) {
        const {error} = await db.from('entries').insert({
          user_id: currentUser.id,
          type: m.type||'movie',
          tmdb_id: m.tmdb_id||null,
          title: m.title,
          year: m.year||null,
          director: m.director||'',
          poster_path: m.poster_path||'',
          ratings: m.ratings||{},
          total_score: m.total_score||calcTotal(m.ratings||{}),
          comment: m.comment||'',
          created_at: m.created_at||new Date().toISOString(),
          updated_at: new Date().toISOString()
        });
        if (!error) count++;
      }
      toast(`已导入 ${count} 条记录`);
      await loadAllData();
    } catch(err) {
      toast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
