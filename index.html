<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD&Ceci — 电影剧集评价</title>
<link rel="stylesheet" href="styles.css?v=20260514">
</head>
<body>

<!-- ═══ Auth Overlay ═══ -->
<div id="authOverlay">
  <div class="auth-box">
    <h1><span class="fd">FD</span>&amp;<span class="ce">Ceci</span></h1>

    <!-- Login view -->
    <div id="authLoginView">
      <p class="subtitle">欢迎回来</p>
      <div class="auth-error" id="authError"></div>
      <input type="email" id="authEmail" placeholder="邮箱">
      <input type="password" id="authPassword" placeholder="密码">
      <button class="btn btn-primary" id="loginBtn" style="width:100%">登录</button>
      <div style="text-align:center;margin-top:8px">
        <a id="forgotPwLink" style="color:var(--text2);font-size:0.8rem;cursor:pointer">忘记密码？</a>
      </div>
      <div style="text-align:center;margin-top:8px;font-size:0.85rem;color:var(--text2)">
        没有账号？<a id="showRegisterLink" style="color:var(--gold);cursor:pointer">注册</a>
      </div>
    </div>

    <!-- Register view -->
    <div id="authRegisterView" class="hidden">
      <p class="subtitle">创建账号</p>
      <div class="auth-error" id="authRegError"></div>
      <input type="email" id="regEmail" placeholder="邮箱">
      <input type="password" id="regPassword" placeholder="密码（至少6位）">
      <input type="text" id="regName" placeholder="显示名称（英文或数字，最多6位）">
      <input type="text" id="regInviteCode" placeholder="邀请码">
      <button class="btn btn-primary" id="regSignupBtn" style="width:100%">注册</button>
      <div style="text-align:center;margin-top:8px;font-size:0.85rem;color:var(--text2)">
        <a id="showLoginLink" style="color:var(--gold);cursor:pointer">← 返回登录</a>
      </div>
    </div>

    <!-- Reset password -->
    <div id="resetPwForm" class="hidden" style="margin-top:12px">
      <p style="color:var(--text2);font-size:0.8rem;margin-bottom:8px">输入邮箱，我们将发送重置链接</p>
      <input type="email" id="resetEmail" placeholder="邮箱" style="width:100%;padding:10px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius)">
      <button class="btn btn-primary" id="sendResetBtn" style="width:100%;margin-bottom:6px">发送重置邮件</button>
      <a id="backToLoginLink" style="color:var(--text2);font-size:0.8rem;cursor:pointer">← 返回登录</a>
    </div>

    <!-- New password from recovery -->
    <div id="newPwForm" class="hidden" style="margin-top:12px">
      <p style="color:var(--text2);font-size:0.8rem;margin-bottom:8px">设置新密码</p>
      <input type="password" id="newPassword" placeholder="新密码（至少6位）" style="width:100%;padding:10px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius)">
      <button class="btn btn-primary" id="updatePwBtn" style="width:100%">更新密码并登录</button>
    </div>
  </div>
</div>

<!-- ═══ Name Setup ═══ -->
<div id="nameOverlay" class="modal-overlay">
  <div class="modal" style="max-width:380px">
    <h3>设置显示名称</h3>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:12px">你的名称将对朋友可见</p>
    <input type="text" id="nameInput" placeholder="输入名称" style="width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);margin-bottom:12px">
    <button class="btn btn-primary" id="nameSaveBtn">保存</button>
  </div>
</div>

<!-- ═══ Change Password Modal ═══ -->
<div id="changePwOverlay" class="modal-overlay">
  <div class="modal" style="max-width:380px">
    <h3>修改密码</h3>
    <p style="color:var(--text2);font-size:0.8rem;margin-bottom:12px">输入新密码（至少6位）</p>
    <input type="password" id="changePwInput" placeholder="新密码" style="width:100%;padding:10px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius)">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" id="changePwCancel">取消</button>
      <button class="btn btn-primary btn-sm" id="changePwSave">确认修改</button>
    </div>
  </div>
</div>

<!-- ═══ Invite Code Modal ═══ -->
<div id="inviteCodeOverlay" class="modal-overlay">
  <div class="modal" style="max-width:420px">
    <h3>邀请码管理</h3>
    <div style="margin-bottom:12px">
      <button class="btn btn-primary btn-sm" id="inviteGenerateBtn">生成邀请码</button>
      <span style="font-size:0.75rem;color:var(--text2);margin-left:8px">有效期 3 小时，一码一人</span>
    </div>
    <div id="inviteCodeList" style="max-height:240px;overflow-y:auto">
      <p style="color:var(--text2);font-size:0.8rem">加载中...</p>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-secondary btn-sm" id="inviteCloseBtn">关闭</button>
    </div>
  </div>
</div>

<!-- ═══ Migrate Banner ═══ -->
<div id="migrateBanner" class="hidden" style="background:var(--gold-dim);border:1px solid var(--gold);padding:12px 20px;text-align:center;font-size:0.85rem;color:var(--gold)">
  检测到旧版本本地数据，<a id="migrateLink" style="color:var(--gold);text-decoration:underline;cursor:pointer;font-weight:700">点击迁移</a>到云端账号
  <button id="dismissMigrate" style="background:none;border:none;color:var(--text2);cursor:pointer;margin-left:12px;font-size:1.1rem">&times;</button>
</div>

<!-- ═══ Main App ═══ -->
<div id="mainApp" class="hidden">
  <header>
    <div class="logo"><span class="fd">FD</span>&amp;<span class="ce">Ceci</span></div>
    <div class="header-right">
      <span id="headerCount" style="font-size:0.85rem;color:var(--text2)"></span>
      <div class="user-menu" id="userMenu">
        <span class="user-badge" id="headerUser" style="cursor:pointer"></span>
        <span class="user-arrow">▾</span>
        <div class="user-dropdown" id="userDropdown">
          <button id="changePwBtn">修改密码</button>
          <button id="inviteMenuBtn" class="hidden">邀请码管理</button>
          <button id="watchlistMgmtBtn">想看清单</button>
          <button id="blockedMgmtBtn">管理屏蔽</button>
          <button id="logoutBtn">退出</button>
        </div>
      </div>
    </div>
  </header>

  <nav role="tablist" aria-label="主导航">
    <button class="active" data-tab="rate" role="tab" aria-selected="true" aria-label="添加评价">添加评价</button>
    <button data-tab="list" role="tab" aria-selected="false" aria-label="影单">影单</button>
    <button data-tab="discover" role="tab" aria-selected="false" aria-label="发现好片">发现</button>
    <button data-tab="stats" role="tab" aria-selected="false" aria-label="统计分析">统计分析</button>
  </nav>

  <main>
    <!-- ═══ 添加评价 ═══ -->
    <section class="tab-panel active" id="panel-rate">
      <h2 class="section-title" id="formTitle">记录一部电影</h2>

      <div class="type-toggle" id="typeToggle">
        <button class="active" data-type="movie">🎬 电影</button>
        <button data-type="series">📺 剧集</button>
      </div>

      <div class="search-wrap">
        <input type="text" id="tmdbSearch" placeholder="🔍 从 TMDb 搜索电影/剧集信息，自动填入...">
        <div class="search-results" id="searchResults"></div>
      </div>

      <form id="movieForm" autocomplete="off">
        <input type="hidden" id="editId">
        <input type="hidden" id="tmdbId">
        <input type="hidden" id="posterPath">
        <div class="form-row">
          <div class="form-group">
            <label>名称 *</label>
            <input type="text" id="title" placeholder="电影或剧集名称" required>
          </div>
          <div class="form-group">
            <label>上映年份</label>
            <input type="number" id="year" placeholder="2024" min="1900" max="2100">
          </div>
        </div>
        <div class="form-group">
          <label>导演 / 主创</label>
          <input type="text" id="director" placeholder="导演或编剧">
        </div>

        <div class="dim-list" id="mainDims"></div>

        <div class="total-preview">
          <span class="total-label">加权总分</span>
          <span class="total-value" id="totalScorePreview">5.0</span>
        </div>

        <div class="form-group">
          <label>短评（可选）</label>
          <textarea id="comment" rows="2" placeholder="一句话记录感受..."></textarea>
        </div>

        <!-- Season ratings -->
        <div class="season-section hidden" id="seasonSection">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-weight:600;font-size:0.95rem">📺 分季评分</span>
            <button type="button" class="btn btn-sm btn-secondary" id="addSeasonBtn">+ 添加新季</button>
          </div>
          <div id="seasonList"></div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary" id="submitBtn">保存评价</button>
          <button type="button" class="btn btn-secondary hidden" id="cancelEditBtn">取消编辑</button>
        </div>
      </form>
    </section>

    <!-- ═══ 影单 ═══ -->
    <section class="tab-panel" id="panel-list">
      <h2 class="section-title">我的影单</h2>
      <div class="list-subtabs" id="listSubtabs">
        <button class="active" data-ltype="movie">电影</button>
        <button data-ltype="series">剧集</button>
      </div>
      <div class="list-controls">
        <input type="text" class="search-box" id="searchInput" placeholder="搜索名称或导演...">
        <select id="sortBy">
          <option value="date-desc">最近添加</option>
          <option value="date-asc">最早添加</option>
          <option value="score-desc">评分最高</option>
          <option value="score-asc">评分最低</option>
          <option value="count-desc">评价数量</option>
          <option value="title">按片名 A-Z</option>
        </select>
        <select id="ownerFilter">
          <option value="all">所有人</option>
          <option value="me">仅自己</option>
        </select>
        <select id="scoreFilter">
          <option value="all">全部分数</option>
          <option value="10">10分</option>
          <option value="9">9分</option>
          <option value="8">8分</option>
          <option value="7">7分</option>
          <option value="6">6分</option>
          <option value="5">5分</option>
          <option value="4">4分</option>
          <option value="3">3分</option>
          <option value="2">2分</option>
          <option value="1">1分</option>
        </select>
      </div>
      <div id="movieList"></div>
      <div class="empty-state" id="emptyState">
        <p style="font-size:2rem">🎬</p>
        <p>还没有评价记录</p>
      </div>
      <div class="empty-state hidden" id="loadingState">
        <div class="spinner"></div>
        <p style="margin-top:8px">加载中...</p>
      </div>
    </section>

    <!-- ═══ 发现 ═══ -->
    <section class="tab-panel" id="panel-discover">
      <h2 class="section-title">发现好片</h2>
      <div class="discover-subtabs" id="discoverSubtabs">
        <button class="active" data-dt="recommend" id="discoverRecTab">Ceci推荐</button>
        <button data-dt="week">本周热门</button>
        <button data-dt="toprated">Top100</button>
      </div>
      <div id="discoverContent"></div>
    </section>

    <!-- ═══ 统计 ═══ -->
    <section class="tab-panel" id="panel-stats">
      <h2 class="section-title">统计概览</h2>
      <div class="list-subtabs" id="statsFilter" style="margin-bottom:8px">
        <button class="active" data-sf="me">自己</button>
        <button data-sf="others">他人</button>
        <button data-sf="compare">对比</button>
      </div>
      <div class="list-subtabs" id="statsTypeFilter" style="margin-bottom:8px">
        <button class="active" data-st="all">全部</button>
        <button data-st="movie">电影</button>
        <button data-st="series">剧集</button>
      </div>
      <div id="statsUserRow" class="hidden" style="margin-bottom:12px">
        <select id="statsUserPicker" style="padding:6px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:0.85rem"></select>
      </div>
      <div id="statsContent"></div>
      <div class="settings-section">
        <h3 style="margin-bottom:12px;color:var(--text2);font-size:0.9rem;">数据管理</h3>
        <div class="btn-group">
          <button class="btn btn-secondary" id="exportBtn">导出 JSON</button>
          <button class="btn btn-secondary" id="importBtn">导入 JSON</button>
          <input type="file" id="importFile" accept=".json" style="display:none">
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Quick Rate Modal -->
<div class="modal-overlay" id="quickRateModal">
  <div class="modal" style="max-width:480px">
    <h3 id="qrTitle">评价</h3>
    <div class="dim-list" id="qrDims"></div>
    <div class="total-preview">
      <span class="total-label">加权总分</span>
      <span class="total-value" id="qrTotalScore">5.0</span>
    </div>
    <div class="form-group">
      <label>短评（可选）</label>
      <textarea id="qrComment" rows="2" placeholder="一句话记录感受..."></textarea>
    </div>
    <div class="btn-group" style="justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" id="qrCancel">取消</button>
      <button class="btn btn-primary btn-sm" id="qrSubmit">提交评价</button>
    </div>
  </div>
</div>

<!-- Blocked Movies Modal -->
<div class="modal-overlay" id="blockedModal">
  <div class="modal" style="max-width:680px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0;color:var(--text2)">不再推荐的电影 (<span id="blockedCount">0</span>)</h3>
      <button class="btn btn-xs btn-secondary" id="blockedModalClose">关闭</button>
    </div>
    <div class="discover-grid" id="blockedMovieGrid"></div>
    <div id="blockedPagination"></div>
  </div>
</div>

<!-- Watchlist Modal -->
<div class="modal-overlay" id="watchlistModal">
  <div class="modal" style="max-width:680px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0;color:var(--text2)">想看清单 (<span id="watchlistCount">0</span>)</h3>
      <button class="btn btn-xs btn-secondary" id="watchlistModalClose">关闭</button>
    </div>
    <div class="discover-grid" id="watchlistMovieGrid"></div>
    <div id="watchlistPagination"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="api.js?v=20260514"></script>
<script src="tmdb-cache.js?v=20260514"></script>
<script src="recommend-ui.js?v=20260514"></script>
<script src="app.js?v=20260514"></script>
</body>
</html>
