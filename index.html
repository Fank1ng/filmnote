<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan&ceci — 电影剧集评价</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
    --text: #e0e0e0; --text2: #888; --gold: #d4a853;
    --gold-dim: #3a3020; --radius: 10px; --t: 0.2s ease;
    --danger: #a04040; --danger-bg: #2a1515;
    --friend: #5b9db0; --friend-dim: #1a2a30;
    --ceci: #FF69B4; --ceci-dim: #2a1525;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
  }
  .hidden { display: none !important; }

  /* ── Auth ── */
  #authOverlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .auth-box { width: 360px; padding: 32px; }
  .auth-box h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .auth-box h1 span { color: var(--gold); }
  .auth-box .subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 24px; }
  .auth-box input {
    width: 100%; padding: 12px; margin-bottom: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); font-size: 0.95rem;
  }
  .auth-box input:focus { border-color: var(--gold); outline: none; }
  .auth-box .btn { width: 100%; margin-bottom: 8px; padding: 12px; }
  .auth-box .toggle { text-align: center; font-size: 0.85rem; color: var(--text2); }
  .auth-box .toggle a { color: var(--gold); cursor: pointer; }
  .auth-error { color: #d44; font-size: 0.85rem; margin-bottom: 8px; }

  /* ── Header ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 1.3rem; font-weight: 700; }
  .logo span { color: var(--gold); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-badge { font-size: 0.8rem; color: var(--gold); }

  /* ── Tabs ── */
  nav { display: flex; gap: 4px; padding: 16px 24px 0; }
  nav button {
    background: none; border: none; color: var(--text2);
    padding: 10px 20px; cursor: pointer; font-size: 0.95rem;
    border-radius: 8px 8px 0 0; transition: var(--t);
  }
  nav button:hover { color: var(--text); background: var(--surface); }
  nav button.active { color: var(--gold); background: var(--surface); }

  /* ── Main ── */
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--gold); }

  /* ── Type Toggle ── */
  .type-toggle { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border-radius: var(--radius); padding: 3px; }
  .type-toggle button {
    flex: 1; padding: 8px 16px; border: none; cursor: pointer;
    background: transparent; color: var(--text2); border-radius: 8px;
    font-size: 0.9rem; font-weight: 500; transition: var(--t);
  }
  .type-toggle button.active { background: var(--gold-dim); color: var(--gold); }

  /* ── TMDb Search ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%; padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); font-size: 0.95rem;
  }
  .search-wrap input:focus { border-color: var(--gold); outline: none; }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 20;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); max-height: 360px; overflow-y: auto;
    display: none; margin-top: 4px;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    cursor: pointer; transition: var(--t); border-bottom: 1px solid var(--border);
  }
  .sr-item:hover { background: rgba(255,255,255,0.04); }
  .sr-item:last-child { border-bottom: none; }
  .sr-poster { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; background: var(--border); }
  .sr-info { flex: 1; }
  .sr-title { font-size: 0.9rem; font-weight: 500; }
  .sr-meta { font-size: 0.75rem; color: var(--text2); }
  .sr-type { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: var(--gold-dim); color: var(--gold); }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); font-size: 0.95rem; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); outline: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* ── Dimensions ── */
  .dim-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .dim-row { display: flex; align-items: center; gap: 12px; }
  .dim-info { min-width: 120px; }
  .dim-name { font-size: 0.9rem; font-weight: 500; }
  .dim-weight { font-size: 0.72rem; color: var(--text2); }
  .dim-slider { flex: 1; display: flex; align-items: center; gap: 10px; }
  .dim-slider input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; background: var(--border); border-radius: 3px; outline: none;
  }
  .dim-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--bg);
  }
  .dim-score { width: 32px; text-align: center; font-weight: 700; font-size: 1rem; color: var(--gold); }
  .total-preview {
    background: var(--gold-dim); border: 1px solid var(--gold);
    border-radius: var(--radius); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .total-label { font-size: 0.9rem; color: var(--gold); }
  .total-value { font-size: 2rem; font-weight: 800; color: var(--gold); }

  /* ── Buttons ── */
  .btn {
    padding: 10px 20px; border-radius: var(--radius); cursor: pointer;
    font-size: 0.9rem; font-weight: 600; border: none; transition: var(--t);
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { background: #c49b45; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-xs { padding: 3px 8px; font-size: 0.7rem; border-radius: 6px; }
  .btn-group { display: flex; gap: 10px; margin-top: 20px; }

  /* ── Season Rating Cards ── */
  .season-section { margin-bottom: 20px; }
  .season-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  }
  .season-header {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .season-header:hover { background: rgba(255,255,255,0.02); }
  .season-title { font-weight: 600; font-size: 0.9rem; }
  .season-score { color: var(--gold); font-weight: 700; }
  .season-body { padding: 0 16px 16px; display: none; }
  .season-body.open { display: block; }
  .season-body .dim-list { gap: 8px; }
  .season-body .dim-info { min-width: 100px; }
  .season-body .dim-name { font-size: 0.8rem; }
  .season-body .dim-slider input[type="range"]::-webkit-slider-thumb { width: 16px; height: 16px; }
  .season-body .dim-score { font-size: 0.85rem; }

  /* ── List ── */
  .list-subtabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .list-subtabs button {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 6px 16px; cursor: pointer; font-size: 0.85rem; border-radius: 20px; transition: var(--t);
  }
  .list-subtabs button:hover { border-color: var(--gold); color: var(--text); }
  .list-subtabs button.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .list-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .list-controls input, .list-controls select {
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 0.85rem;
  }
  .list-controls input:focus, .list-controls select:focus { border-color: var(--gold); outline: none; }
  .search-box { flex: 1; min-width: 180px; }

  .movie-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px; transition: var(--t); cursor: pointer;
  }
  .movie-card:hover { border-color: var(--gold); }
  .mc-poster { width: 44px; height: 66px; border-radius: 6px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .mc-score {
    width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
    background: var(--gold-dim); border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 800; color: var(--gold);
  }
  .mc-info { flex: 1; min-width: 0; }
  .mc-title { font-weight: 600; font-size: 0.95rem; }
  .mc-meta { font-size: 0.78rem; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 8px; }
  .mc-owner { font-size: 0.7rem; color: var(--gold); background: var(--gold-dim); padding: 1px 6px; border-radius: 4px; }
  .mc-dim-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .mc-dim-scores span { font-size: 0.68rem; color: var(--text2); background: rgba(255,255,255,0.04); padding: 1px 6px; border-radius: 4px; }
  .mc-comment { font-size: 0.8rem; color: var(--text2); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
  .mc-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .mc-season-badge { font-size: 0.7rem; color: var(--gold); background: var(--gold-dim); padding: 2px 8px; border-radius: 10px; }
  .mc-scores-compare { display: flex; gap: 12px; align-items: center; }
  .mc-score-sm {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; font-weight: 800; flex-direction: column;
  }
  .mc-score-mine { border: 2px solid var(--gold); background: var(--gold-dim); color: var(--gold); }
  .mc-score-friend { border: 2px solid var(--friend); background: var(--friend-dim); color: var(--friend); }
  .mc-score-ceci { border: 2px solid var(--ceci); background: var(--ceci-dim); color: var(--ceci); }
  .mc-score-label { font-size: 0.55rem; font-weight: 400; line-height: 1; }
  .mc-dim-row { font-size: 0.65rem; color: var(--text2); display: flex; gap: 4px; align-items: center; }
  .mc-dim-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .mc-dim-row .dot-mine { background: var(--gold); }
  .mc-dim-row .dot-friend { background: var(--friend); }
  .mc-dim-row .dot-ceci { background: var(--ceci); }
  .mc-dim-user { font-size: 0.65rem; font-weight: 600; white-space: nowrap; min-width: 75px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }

  /* ── Stats Compare ── */
  .stat-compare-row { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
  .stat-compare-label { width: 110px; font-size: 0.82rem; text-align: right; flex-shrink: 0; }
  .stat-compare-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .stat-compare-bar { height: 7px; border-radius: 3px; }
  .stat-compare-bar.mine { background: var(--gold); }
  .stat-compare-bar.friend { background: var(--friend); }
  .stat-compare-values { display: flex; gap: 12px; font-size: 0.78rem; font-weight: 600; width: 70px; flex-shrink: 0; }
  .stat-compare-values .v-mine { color: var(--gold); }
  .stat-compare-values .v-friend { color: var(--friend); }
  .stat-compare-values .v-ceci { color: var(--ceci); }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; text-align: center;
  }
  .stat-value { font-size: 2rem; font-weight: 800; color: var(--gold); }
  .stat-label { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
  .stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .stat-bar-label { width: 110px; font-size: 0.82rem; text-align: right; }
  .stat-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.5s ease; }
  .stat-bar-value { width: 34px; font-size: 0.82rem; font-weight: 600; }
  .score-dist { display: flex; gap: 6px; align-items: flex-end; height: 120px; margin-bottom: 20px; padding: 0 4px; position: relative; }
  .score-dist::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 23px, var(--border) 23px, var(--border) 24px);
    opacity: 0.3; pointer-events: none; border-radius: 4px;
  }
  .score-dist-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 1; }
  .score-dist-fill { width: 100%; background: var(--gold); border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.5s ease; }
  .score-dist-fill:hover { filter: brightness(1.3); }
  .score-dist-label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
  .score-dist-count { font-size: 0.7rem; font-weight: 700; color: var(--gold); }

  /* ── Compare Distribution ── */
  .compare-dist { display: flex; gap: 6px; align-items: flex-end; height: 140px; padding: 0 2px; }
  .cd-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .cd-bars { display: flex; gap: 3px; align-items: flex-end; flex: 1; width: 100%; justify-content: center; }
  .cd-bar { width: 14px; border-radius: 3px 3px 0 0; min-height: 3px; position: relative; transition: height 0.5s ease; }
  .cd-bar:hover { filter: brightness(1.3); }
  .cd-mine { background: var(--gold); }
  .cd-friend { background: var(--friend); }
  .cd-ceci { background: var(--ceci); }
  .cd-count { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 700; white-space: nowrap; color: var(--text); }
  .cd-label { font-size: 0.68rem; color: var(--text2); }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; max-width: 600px; width: 92%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 12px; color: var(--gold); }
  .modal .friend-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal .friend-section h4 { font-size: 0.85rem; color: var(--text2); margin-bottom: 8px; }
  .friend-rating {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin-bottom: 6px;
    opacity: 0.8;
  }
  .friend-rating .fr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .friend-rating .fr-name { font-size: 0.8rem; color: var(--gold); }
  .friend-rating .fr-score { font-weight: 700; color: var(--gold); }

  .settings-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--gold);
    color: var(--text); padding: 12px 24px; border-radius: var(--radius);
    font-size: 0.9rem; z-index: 300; opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .movie-card { flex-wrap: wrap; }
    .mc-actions { width: 100%; justify-content: flex-end; }
    .dim-info { min-width: 90px; }
    header { padding: 10px 14px; }
    main { padding: 14px; }
  }
</style>
</head>
<body>

<!-- ═══ Auth Overlay ═══ -->
<div id="authOverlay">
  <div class="auth-box">
    <h1>Fan<span>&amp;ceci</span></h1>
    <p class="subtitle">登录或注册</p>
    <div class="auth-error" id="authError"></div>
    <input type="email" id="authEmail" placeholder="邮箱">
    <input type="password" id="authPassword" placeholder="密码">
    <input type="text" id="authName" placeholder="显示名称（注册时填写）">
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="loginBtn" style="flex:1">登录</button>
      <button class="btn btn-secondary" id="signupBtn" style="flex:1">注册</button>
    </div>
  </div>
</div>

<!-- ═══ Name Setup ═══ -->
<div id="nameOverlay" class="modal-overlay">
  <div class="modal" style="max-width:380px">
    <h3>设置显示名称</h3>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:12px">你的名称将对朋友可见</p>
    <input type="text" id="nameInput" placeholder="输入名称" style="width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);margin-bottom:12px">
    <button class="btn btn-primary" id="nameSaveBtn">保存</button>
  </div>
</div>

<!-- ═══ Migrate Banner ═══ -->
<div id="migrateBanner" class="hidden" style="background:var(--gold-dim);border:1px solid var(--gold);padding:12px 20px;text-align:center;font-size:0.85rem;color:var(--gold)">
  检测到旧版本本地数据，<a id="migrateLink" style="color:var(--gold);text-decoration:underline;cursor:pointer;font-weight:700">点击迁移</a>到云端账号
  <button id="dismissMigrate" style="background:none;border:none;color:var(--text2);cursor:pointer;margin-left:12px;font-size:1.1rem">&times;</button>
</div>

<!-- ═══ Main App ═══ -->
<div id="mainApp" class="hidden">
  <header>
    <div class="logo">Fan<span>&amp;ceci</span></div>
    <div class="header-right">
      <span class="user-badge" id="headerUser"></span>
      <span id="headerCount" style="font-size:0.85rem;color:var(--text2)"></span>
      <button class="btn btn-sm btn-secondary" id="logoutBtn">退出</button>
    </div>
  </header>

  <nav>
    <button class="active" data-tab="rate">添加评价</button>
    <button data-tab="list">影单</button>
    <button data-tab="stats">统计分析</button>
  </nav>

  <main>
    <!-- ═══ 添加评价 ═══ -->
    <section class="tab-panel active" id="panel-rate">
      <h2 class="section-title" id="formTitle">记录一部电影</h2>

      <div class="type-toggle" id="typeToggle">
        <button class="active" data-type="movie">🎬 电影</button>
        <button data-type="series">📺 剧集</button>
      </div>

      <div class="search-wrap">
        <input type="text" id="tmdbSearch" placeholder="🔍 从 TMDb 搜索电影/剧集信息，自动填入...">
        <div class="search-results" id="searchResults"></div>
      </div>

      <form id="movieForm" autocomplete="off">
        <input type="hidden" id="editId">
        <input type="hidden" id="tmdbId">
        <input type="hidden" id="posterPath">
        <div class="form-row">
          <div class="form-group">
            <label>名称 *</label>
            <input type="text" id="title" placeholder="电影或剧集名称" required>
          </div>
          <div class="form-group">
            <label>上映年份</label>

// ===== HELPERS =====
function calcTotal(ratings) { let s=0; for(const [k,w] of Object.entries(WEIGHTS)) s+=(ratings[k]||5)*w; return Math.round(s*10)/10; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtDate(d){ if(!d) return ''; const dt=new Date(d); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }

// ===== AUTH BUTTONS =====
$['signupBtn'].addEventListener('click', async ()=>{
  const btn = $['signupBtn'];
  const origText = btn.textContent;
  btn.textContent = '注册中...';
  btn.disabled = true;
  try {
    const email = $['authEmail'].value.trim();
    const password = $['authPassword'].value;
    const name = $['authName'].value.trim();
    if (!email || !password) { showAuthError('请填写邮箱和密码'); return; }
    if (!name) { showAuthError('请填写显示名称'); return; }
    if (!db) { showAuthError('初始化失败，请刷新页面'); return; }

    const {data, error} = await db.auth.signUp({
      email, password,
      options: { data: { display_name: name } }
    });
    if (error) {
      showAuthError(error.message.includes('already registered') ? '该邮箱已注册，请直接登录' : error.message);
      return;
    }
    if (data.user?.identities?.length===0) { showAuthError('该邮箱已注册，请直接登录'); return; }
    const {data: loginData, error: signInErr} = await db.auth.signInWithPassword({email, password});
    if (signInErr) { showAuthError('注册成功但登录失败，请尝试手动登录'); return; }
    await initApp(loginData.user);
    toast('注册成功！');
  } catch(e) {
    showAuthError('错误: ' + (e.message||e));
    console.error(e);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
});

function checkMigration() {

  }
}
$['migrateLink'].addEventListener('click', async ()=>{
  const old = JSON.parse(localStorage.getItem('filmnote_movies')||'[]');
  if (!old.length) return;
  if (!confirm(`将迁移 ${old.length} 条旧记录到云端账号"${currentProfile?.display_name}"，确认？`)) return;

  let movieCount = 0, seriesCount = 0;
  for (const m of old) {
    const entry = {
      user_id: currentUser.id,
      type: m.type || 'movie',
      title: m.title,
      year: m.year || null,
      director: m.director || '',
      ratings: m.ratings || {},
      total_score: m.totalScore || calcTotal(m.ratings||{}),
      comment: m.comment || '',
      created_at: m.createdAt || new Date().toISOString(),
      updated_at: m.updatedAt || new Date().toISOString()
    };
    const {data:inserted, error} = await db.from('entries').insert(entry).select('id').single();
    if (!error && inserted) {
      if (entry.type==='series') seriesCount++; else movieCount++;
      if (entry.type==='series' && m.seasons && m.seasons.length) {
        for (const s of m.seasons) {
          await db.from('season_ratings').insert({
            entry_id: inserted.id, user_id: currentUser.id,
            season_number: s.season_number||1, season_title: s.season_title||'',
            ratings: s.ratings||{}, total_score: s.totalScore||calcTotal(s.ratings||{}),
            comment: s.comment||'', created_at: new Date().toISOString(), updated_at: new Date().toISOString()
          });
        }
      }
    }
  }
  const total = movieCount + seriesCount;
  if (total) {
    localStorage.removeItem('filmnote_movies');
    const parts = []; if (movieCount) parts.push(`${movieCount} 部电影`); if (seriesCount) parts.push(`${seriesCount} 部剧集`);
    toast(`已迁移 ${parts.join('、')}，共 ${total} 条记录`);
  }
  $['migrateBanner'].classList.add('hidden');
  loadAllData();
});

});

async function loadAllData() {
  if (!currentUser) return;
  try {
    const [{data:entries},{data:seasons},{data:prefs}] = await Promise.all([
      db.from('entries').select('*').order('created_at',{ascending:false}),
      db.from('season_ratings').select('*').order('season_number',{ascending:true}),
      db.from('user_preferences').select('*')
    ]);
    allEntries = entries || [];
    allSeasonRatings = seasons || [];
    allProfiles = {};
    (prefs||[]).forEach(p=>{ allProfiles[p.user_id]=p; });
    const mCount = allEntries.filter(e=>e.type==='movie').length;
    const sCount = allEntries.filter(e=>e.type==='series').length;
    const hparts = []; if (mCount) hparts.push(`${mCount}部电影`); if (sCount) hparts.push(`${sCount}部剧集`);
    $['headerCount'].textContent = hparts.length ? `共 ${hparts.join(' ')}` : '暂无记录';
    renderList();
    renderStats();
  } catch(e) {
    console.error('loadAllData error:', e);
    toast('加载数据失败: ' + (e.message||e));
  }
}

function buildDimSliders(prefix, ratings) {
  return Object.entries(DIM_LABELS).map(([dim,label])=>`
    <div class="dim-row">
      <div class="dim-info"><div class="dim-name">${label}</div><div class="dim-weight">权重 ${WEIGHTS[dim]*100}%</div></div>
      <div class="dim-slider">
        <input type="range" min="1" max="10" value="${ratings[dim]||5}" data-prefix="${prefix}" data-dim="${dim}" aria-label="${label}" aria-valuenow="${ratings[dim]||5}" aria-valuemin="1" aria-valuemax="10">
        <span class="dim-score" data-prefix="${prefix}" data-dim="${dim}">${ratings[dim]||5}</span>
      </div>
    </div>
  `).join('');
}

      </div>

      </div>
    </div>
  `;
  $['seasonList'].appendChild(card);

  // Toggle expand
  card.querySelector('.season-header').addEventListener('click', function(e) {
    if (e.target.tagName==='INPUT') return;
    card.querySelector('.season-body').classList.toggle('open');
  });
  // Expand by default for new seasons
  if (!seasonData?._id) card.querySelector('.season-body').classList.add('open');

function removeSeason(idx) {
  const card = document.querySelector(`.season-card[data-season-idx="${idx}"]`);
  if (card) card.remove();
}

function collectSeasonData() {
  const seasons = [];
  document.querySelectorAll('.season-card').forEach(card=>{
    const idx = card.dataset.seasonIdx;
    const prefix = `s${idx}`;
    const numInput = card.querySelector('.season-header input[type="number"]');
    const titleInput = card.querySelector('.season-header input[type="text"]');
    const ratings = {};
    card.querySelectorAll(`input[type="range"][data-prefix="${prefix}"]`).forEach(s=>{
      ratings[s.dataset.dim] = parseInt(s.value);
    });
    const commentEl = card.querySelector('textarea');
    seasons.push({
      _idx: idx,
      season_number: parseInt(numInput?.value) || 0,
      season_title: titleInput?.value?.trim() || '',
      ratings,
      total_score: calcTotal(ratings),
      comment: commentEl?.value?.trim() || ''
    });
  });
  seasons.sort((a,b)=>a.season_number-b.season_number);
  return seasons;
}

$['addSeasonBtn'].addEventListener('click', ()=>{
  const existing = collectSeasonData().map(s=>s.season_number);
  const next = existing.length>0 ? Math.max(...existing)+1 : 1;
  addSeasonRow({ season_number: next });
});

let tmdbTimer = null;
$['tmdbSearch'].addEventListener('input', function(){
  clearTimeout(tmdbTimer);
  const q = this.value.trim();
  if (!q) { $['searchResults'].classList.remove('open'); return; }
  tmdbTimer = setTimeout(()=>searchTmdb(q), 350);
});

async function searchTmdb(query) {
  const container = $['searchResults'];
  try {
    const type = entryType==='series' ? 'tv' : 'movie';
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=zh-CN`, { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.results?.length) {
      container.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:0.85rem">无结果</div>';
      container.classList.add('open');
      return;
    }
    container.innerHTML = data.results.slice(0,8).map(r=>{
      const title = r.title || r.name;
      const year = (r.release_date||r.first_air_date||'').slice(0,4);
      const poster = r.poster_path ? posterUrl(r.poster_path) : '';
      return `
        <div class="sr-item" data-tmdb-id="${r.id}" data-title="${esc(title)}" data-year="${year}" data-poster="${r.poster_path||''}">
          ${poster ? `<img class="sr-poster" src="${poster}" alt="">` : '<div class="sr-poster"></div>'}
          <div class="sr-info">
            <div class="sr-title">${esc(title)}</div>
            <div class="sr-meta">${year||'未知'} ${r.overview ? '· '+esc(r.overview.slice(0,60))+'...' : ''}</div>
          </div>
          <span class="sr-type">${entryType==='series'?'剧集':'电影'}</span>
        </div>
      `;
    }).join('');
    container.classList.add('open');

    // Click handler
    container.querySelectorAll('.sr-item').forEach(item=>{
      item.addEventListener('click', async ()=>{
        const tmdbId = item.dataset.tmdbId;
        $['title'].value = item.dataset.title;
        $['year'].value = item.dataset.year || '';
        $['tmdbId'].value = tmdbId;
        $['posterPath'].value = item.dataset.poster;
        $['tmdbSearch'].value = '';
        container.classList.remove('open');

        // Fetch director
        try {
          const type = entryType==='series' ? 'tv' : 'movie';
          const credRes = await fetch(`https://api.themoviedb.org/3/${type}/${tmdbId}/credits?api_key=${TMDB_KEY}&language=zh-CN`);
          const credData = await credRes.json();
          let director = '';
          if (entryType==='series') {
            const creator = (credData.crew||[]).find(c=>c.job==='Director'||c.job==='Executive Producer');
            director = creator?.name || '';
          } else {
            const dir = (credData.crew||[]).find(c=>c.job==='Director');
            director = dir?.name || '';
          }
          if (director) $['director'].value = director;
        } catch(e){}
        toast('已自动填入信息');
      });
    });
  } catch(e) {
    container.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:0.85rem">搜索失败</div>';
    container.classList.add('open');
  }
}

$['movieForm'].addEventListener('submit', async e=>{
  e.preventDefault();
  const btn = $['submitBtn'];
  const origText = btn.textContent;
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    const title = $['title'].value.trim();
    if (!title) { toast('请填写电影名称'); btn.textContent=origText; btn.disabled=false; return; }
    if (title.length < 2 || title.length > 100) { toast('片名需 2-100 个字符'); btn.textContent=origText; btn.disabled=false; return; }
    const yearVal = parseInt($['year'].value);
    if ($['year'].value && (isNaN(yearVal) || yearVal < 1900 || yearVal > 2100)) { toast('年份需在 1900-2100 之间'); btn.textContent=origText; btn.disabled=false; return; }

    const ratings = getMainRatings();
    const entryData = {
      user_id: currentUser.id,
      type: entryType,
      tmdb_id: parseInt($['tmdbId'].value) || null,
      title,
      year: parseInt($['year'].value) || null,
      director: $['director'].value.trim(),
      poster_path: $['posterPath'].value,
      ratings,
      total_score: calcTotal(ratings),
      comment: $['comment'].value.trim(),
      updated_at: new Date().toISOString()
    };

    let entryId = editingEntryId;

    if (editingEntryId) {
      const {error: delErr} = await db.from('season_ratings').delete().eq('entry_id', editingEntryId).eq('user_id', currentUser.id);
      if (delErr) { toast('清除旧季数据失败: '+delErr.message); btn.textContent=origText; btn.disabled=false; return; }
      const {error: updateErr} = await db.from('entries').update(entryData).eq('id', editingEntryId);
      if (updateErr) { toast('更新失败: '+updateErr.message); btn.textContent=origText; btn.disabled=false; return; }
    } else {
      entryData.created_at = new Date().toISOString();
      // Verify session before insert
      const {data:{session}} = await db.auth.getSession();
      if (!session) { toast('登录已过期，请重新登录'); return; }
      const {data:inserted, error: insertErr} = await db.from('entries').insert(entryData).select('id').single();
      if (insertErr) {
        toast('保存失败: '+insertErr.message+' (code:'+insertErr.code+')');
        console.error('Insert error:', insertErr);
        return;
      }
      if (!inserted) { toast('保存失败：未返回数据'); return; }
      entryId = inserted.id;
    }

    if (entryType==='series') {
      const seasons = collectSeasonData().filter(s=>s.season_number>0);
      for (const s of seasons) {
        await db.from('season_ratings').insert({
          entry_id: entryId,
          user_id: currentUser.id,
          season_number: s.season_number,
          season_title: s.season_title,
          ratings: s.ratings,
          total_score: s.total_score,
          comment: s.comment,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        });
      }
    }

    toast(editingEntryId ? '评价已更新' : '评价已保存');
    highlightEntryId = entryId;
    resetForm();
    const prevSort = $['sortBy'].value;
    $['sortBy'].value = 'date-desc';
    await loadAllData();
    switchTab('list');
    setTimeout(() => { $['sortBy'].value = prevSort; }, 800);
  } catch(err) {
    toast('保存出错: ' + (err.message||err));
    console.error('Save error:', err);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
});

function getUserColor(userId) {
  const name = (allProfiles[userId]?.display_name||'').toLowerCase();

let listType = 'movie';

let listPageSize = 20;
let listPageNum = 1;

function renderList() {
  const container = $['movieList'];
  const empty = $['emptyState'];
  const loading = $['loadingState'];
  const query = $['searchInput'].value.toLowerCase();
  const sort = $['sortBy'].value;

  const scoreFilterVal = $['scoreFilter'].value;
  let filtered = allEntries.filter(e=>{
    if (e.type!==listType) return false;
    if (ownerFilter==='me' && e.user_id!==currentUser.id) return false;
    if (scoreFilterVal!=='all' && Math.floor(e.total_score)!==parseInt(scoreFilterVal)) return false;
    if (query) {
      const hay = (e.title+(e.director||'')).toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  filtered.sort((a,b)=>{
    switch(sort) {
      case 'date-desc': return new Date(b.created_at)-new Date(a.created_at);
      case 'date-asc': return new Date(a.created_at)-new Date(b.created_at);
      case 'score-desc': return b.total_score-a.total_score;
      case 'score-asc': return a.total_score-b.total_score;
      case 'title': return a.title.localeCompare(b.title,'zh');
      default: return 0;
    }
  });

  loading.classList.add('hidden');
  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  // Group entries by tmdb_id or title+year
  const groups = [];
  const seen = new Set();
  filtered.forEach(e=>{
    const gkey = e.tmdb_id ? 'tmdb_'+e.tmdb_id : 'title_'+e.title.toLowerCase().trim()+'_'+(e.year||0);
    if (seen.has(gkey)) return;
    seen.add(gkey);
    const group = filtered.filter(f=>{
      const fkey = f.tmdb_id ? 'tmdb_'+f.tmdb_id : 'title_'+f.title.toLowerCase().trim()+'_'+(f.year||0);
      return fkey === gkey;
    });
    groups.push(group);
  });

  // Pagination: slice groups for current page
  const pageGroups = groups.slice(0, listPageNum * listPageSize);
  const hasMore = pageGroups.length < groups.length;

  container.innerHTML = pageGroups.map(group=>{
    const main = group.find(e=>e.user_id===currentUser.id) || group[0];
    const others = group.filter(e=>e.user_id!==currentUser.id);
    const isMine = main.user_id===currentUser.id;
    const uniqueUsers = new Set(group.map(e=>e.user_id));
    const merged = uniqueUsers.size > 1;
    const seasonCount = main.type==='series' ? allSeasonRatings.filter(s=>s.entry_id===main.id&&s.user_id===main.user_id).length : 0;

    const dimTags = (entry, uc) => Object.entries(entry.ratings||{}).map(([dim,score])=>
      `<span class="mc-dim-row"><span class="dot dot-${uc.key}"></span>${DIM_LABELS[dim].slice(0,2)} ${score}</span>`
    ).join('');

    if (merged) {
      // Score badges for ALL users in the group
      const scoreBadges = group.map(e=>{
        const uc = getUserColor(e.user_id);
        const uname = allProfiles[e.user_id]?.display_name||'未知';
        return `<div class="mc-score-sm mc-score-${uc.key}" title="${esc(uname)}">
          <span class="mc-score-label">${esc(uname)}</span>
          ${e.total_score.toFixed(1)}
        </div>`;
      }).join('');

      // Dim score rows for ALL users (each on their own row)
      const currentUserInGroup = group.some(e=>e.user_id===currentUser.id);
      const dimRows = group.map(e=>{
        const uc = getUserColor(e.user_id);
        const uname = allProfiles[e.user_id]?.display_name||'未知';
        const isMe = e.user_id===currentUser.id;
        const eSeasonCount = e.type==='series' ? allSeasonRatings.filter(s=>s.entry_id===e.id&&s.user_id===e.user_id).length : 0;
        let actionsHtml = '';
        if (isMe) {
          actionsHtml = `<div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="editEntry('${e.id}')">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteEntry('${e.id}')">删除</button>
          </div>`;
        } else if (!currentUserInGroup) {
          actionsHtml = `<div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="addMyRating('${e.id}')">＋我的评分</button>
          </div>`;
        }
        return `<div class="mc-dim-row-user" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:2px 0">
          <span class="mc-dim-user" style="color:${uc.main}">${esc(uname)}</span>${dimTags(e, uc)}
          ${actionsHtml}
        </div>`;
      }).join('');

      return `
        <div class="movie-card" id="entry-${main.id}" onclick="showDetail('${main.id}')" aria-label="${esc(main.title)} — ${group.map(e=>allProfiles[e.user_id]?.display_name||'?').join('、')}">
          ${main.poster_path ? `<img class="mc-poster" src="${posterUrl(main.poster_path)}" alt="">` : '<div class="mc-poster"></div>'}
          <div class="mc-scores-compare" style="flex-wrap:wrap;gap:8px">${scoreBadges}</div>
          <div class="mc-info">
            <div class="mc-title">
              ${esc(main.title)}
              ${main.year ? '<span style="color:var(--text2);font-weight:400">('+main.year+')</span>':''}
              ${main.type==='series' ? '<span style="font-size:0.7rem;color:var(--gold)"> 剧集</span>' : ''}
            </div>
            <div class="mc-meta">
              ${main.director ? esc(main.director)+' · ':''}
              ${seasonCount>0 ? `<span class="mc-season-badge">S1-S${seasonCount}</span>` : ''}
            </div>
            <div class="mc-dim-scores" style="flex-direction:column;gap:2px">
              ${dimRows}
            </div>
          </div>
        </div>
      `;
    } else {
      // Single entry
      const ownerName = allProfiles[main.user_id]?.display_name||'未知';
      return `
        <div class="movie-card" id="entry-${main.id}" onclick="showDetail('${main.id}')" aria-label="${esc(main.title)} - ${esc(ownerName)} ${main.total_score.toFixed(1)}分">
          ${main.poster_path ? `<img class="mc-poster" src="${posterUrl(main.poster_path)}" alt="">` : '<div class="mc-poster"></div>'}
          <div class="mc-score" style="border-color:${getUserColor(main.user_id).main};background:${getUserColor(main.user_id).dim};color:${getUserColor(main.user_id).main}">${main.total_score.toFixed(1)}</div>
          <div class="mc-info">
            <div class="mc-title">
              ${esc(main.title)}
              ${main.year ? '<span style="color:var(--text2);font-weight:400">('+main.year+')</span>':''}
              ${main.type==='series' ? '<span style="font-size:0.7rem;color:var(--gold)"> 剧集</span>' : ''}
            </div>
            <div class="mc-meta">
              ${main.director ? esc(main.director)+' · ':''}${fmtDate(main.created_at)}
              ${!isMine ? `<span class="mc-owner" style="color:${getUserColor(main.user_id).main};background:${getUserColor(main.user_id).dim}">${esc(ownerName)}</span>` : ''}
              ${seasonCount>0 ? `<span class="mc-season-badge">S1-S${seasonCount}</span>` : ''}
            </div>
            <div class="mc-dim-scores">
              ${Object.entries(main.ratings||{}).map(([dim,score])=>`<span>${DIM_LABELS[dim].slice(0,2)} ${score}</span>`).join('')}
            </div>
            ${main.comment ? `<div class="mc-comment">${esc(main.comment)}</div>` : ''}
          </div>
          ${isMine ? `
          <div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="editEntry('${main.id}')">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteEntry('${main.id}')">删除</button>
          </div>` : `
          <div class="mc-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="addMyRating('${main.id}')">＋我的评分</button>
          </div>`}
        </div>
      `;
    }
  }).join('');
  // Load more button
  if (hasMore) {
    container.innerHTML += `<div style="text-align:center;padding:20px">
      <button class="btn btn-secondary" id="loadMoreBtn" onclick="listPageNum++;renderList();">
        加载更多（已显示 ${pageGroups.length} / ${groups.length}）
      </button></div>`;
  } else {
    listPageNum = 1;
  }
}

        <h4 style="font-size:0.85rem;color:var(--text2);margin-bottom:8px">分季评分</h4>
        ${seasons.map(s=>`
          <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:0.85rem">S${s.season_number} ${s.season_title?esc(s.season_title):''}</span>
            <span style="font-weight:700;color:var(--gold)">${s.total_score.toFixed(1)}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${friendEntries.length ? `
      <div class="friend-section">
        <h4>朋友评分</h4>
        ${friendEntries.map(f=>`
          <div class="friend-rating">
            <div class="fr-header">
              <span class="fr-name" style="color:${getUserColor(f.user_id).main}">${esc(allProfiles[f.user_id]?.display_name||'未知')}</span>
              <span class="fr-score" style="color:${getUserColor(f.user_id).main}">${f.total_score.toFixed(1)} / 10</span>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:0.75rem;color:var(--text2)">
              ${Object.entries(f.ratings||{}).map(([dim,score])=>`<span>${DIM_LABELS[dim].slice(0,2)} ${score}</span>`).join('')}
            </div>
            ${f.comment ? `<p style="font-size:0.8rem;color:var(--text2);font-style:italic;margin-top:4px">"${esc(f.comment)}"</p>` : ''}
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div class="btn-group" style="justify-content:flex-end">
      ${isMine ? `<button class="btn btn-secondary btn-sm" onclick="editEntry('${entry.id}');closeModal()">编辑</button>` : ''}
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">关闭</button>
    </div>
  `;
  modal.classList.add('open');
}

function closeModal() { $['detailModal'].classList.remove('open'); }
$['detailModal'].addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ===== STATS =====
let statsFilter = 'me';
let statsType = 'all';
let statsOtherUser = null;

document.querySelectorAll('#statsFilter button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#statsFilter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsFilter = btn.dataset.sf;
    renderStats();
  });
});

document.querySelectorAll('#statsTypeFilter button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#statsTypeFilter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statsType = btn.dataset.st;
    renderStats();
  });
});

$['statsUserPicker'].addEventListener('change', function(){
  statsOtherUser = this.value || null;
  renderStats();
});

function calcStats(entries) {
  if (!entries.length) return null;
  const avgTotal = entries.reduce((s,m)=>s+m.total_score,0)/entries.length;
  const best = entries.reduce((a,b)=>a.total_score>b.total_score?a:b);
  const worst = entries.reduce((a,b)=>a.total_score<b.total_score?a:b);
  const movies = entries.filter(e=>e.type==='movie').length;
  const series = entries.filter(e=>e.type==='series').length;
  const dimAvgs = {};
  for (const dim of Object.keys(WEIGHTS)) {
    dimAvgs[dim] = entries.reduce((s,m)=>s+(m.ratings[dim]||5),0)/entries.length;
  }
  const dist = new Array(10).fill(0);
  entries.forEach(m=>{ const b=Math.min(Math.floor(m.total_score)-1,9); if(b>=0) dist[b]++; });
  return { avgTotal, best, worst, movies, series, dimAvgs, dist, count: entries.length };
}

function renderStatCards(stats, c) {
  if (!stats) return '<div class="stat-card"><div class="stat-value">-</div><div class="stat-label">无数据</div></div>';
  const mc = c?.main||'#d4a853';
  return `
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${stats.avgTotal.toFixed(1)}</div><div class="stat-label">平均分</div></div>
    <div class="stat-card"><div class="stat-value">${stats.movies}</div><div class="stat-label">电影</div></div>
    <div class="stat-card"><div class="stat-value">${stats.series}</div><div class="stat-label">剧集</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${mc}">${stats.best.total_score.toFixed(1)}</div><div class="stat-label">最高分 · ${esc(stats.best.title.slice(0,8))}</div></div>
    <div class="stat-card"><div class="stat-value">${stats.worst.total_score.toFixed(1)}</div><div class="stat-label">最低分 · ${esc(stats.worst.title.slice(0,8))}</div></div>
  `;
}

function renderDimBars(dimAvgs, c) {
  const mc = c?.main||'#d4a853';
  return Object.entries(dimAvgs).map(([dim,avg])=>`
    <div class="stat-bar-row">
      <span class="stat-bar-label">${DIM_LABELS[dim]}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(avg/10)*100}%;background:${mc}"></div></div>
      <span class="stat-bar-value">${avg.toFixed(1)}</span>
    </div>
  `).join('');
}

function renderDist(dist, c) {
  const maxDist = Math.max(...dist,1);
  const mc = c?.main||'#d4a853';
  return dist.map((c2,i)=>`
    <div class="score-dist-bar">
      <span class="score-dist-count">${c2||''}</span>
      <div class="score-dist-fill" style="height:${(c2/maxDist)*100}%;background:${mc}"></div>
      <span class="score-dist-label">${i+1}分</span>
    </div>
  `).join('');
}

function filterByType(entries) {
  if (statsType==='all') return entries;
  return entries.filter(e=>e.type===statsType);
}

function renderStats() {
  const container = $['statsContent'];
  const userRow = document.getElementById('statsUserRow');
  const userPicker = $['statsUserPicker'];

  // Show/hide user picker for "others" and "compare" filters
  if (statsFilter==='others' || statsFilter==='compare') {
    userRow.style.display = '';
    const otherUsers = [...new Set(allEntries.filter(e=>e.user_id!==currentUser.id).map(e=>e.user_id))];
    const currentVal = userPicker.value;
    userPicker.innerHTML = '<option value="">所有他人</option>' + otherUsers.map(uid=>{
      const name = allProfiles[uid]?.display_name||uid.slice(0,8);
      return `<option value="${uid}"${currentVal===uid?' selected':''}>${esc(name)}</option>`;
    }).join('');
    if (!otherUsers.length) userRow.style.display = 'none';
  } else {
    userRow.style.display = 'none';
    statsOtherUser = null;
  }

  if (allEntries.length===0) {
    container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>';
    return;
  }

  const myEntries = filterByType(allEntries.filter(e=>e.user_id===currentUser.id));

  let otherEntries;
  if (statsOtherUser) {
    otherEntries = filterByType(allEntries.filter(e=>e.user_id===statsOtherUser));
  } else {
    otherEntries = filterByType(allEntries.filter(e=>e.user_id!==currentUser.id));
  }

  const myStats = calcStats(myEntries);
  const otherStats = calcStats(otherEntries);

  const myColor = getUserColor(currentUser.id);
  const otherColor = statsOtherUser ? getUserColor(statsOtherUser) : { key:'friend', main:'#5b9db0', dim:'#1a2a30' };

  const typeLabel = statsType==='movie'?'电影':(statsType==='series'?'剧集':'');
  const typeSuffix = typeLabel ? ` · ${typeLabel}` : '';

  let html = '';

  if (statsFilter==='me') {
    if (!myStats) { container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>'; return; }
    html += `<div class="stats-grid">${renderStatCards(myStats, myColor)}</div>
      <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分${typeSuffix}</h3>
      ${renderDimBars(myStats.dimAvgs, myColor)}
      <h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布${typeSuffix}</h3>
      <div class="score-dist">${renderDist(myStats.dist, myColor)}</div>`;

  } else if (statsFilter==='others') {
    if (!otherStats) { container.innerHTML = '<div class="empty-state"><p>暂无评价数据</p></div>'; return; }
    const otherName = statsOtherUser ? (allProfiles[statsOtherUser]?.display_name||'用户') : '所有他人';
    html += `<h3 style="margin-bottom:14px;font-size:0.9rem;color:${otherColor.main}">${esc(otherName)}${typeSuffix}</h3>
      <div class="stats-grid">${renderStatCards(otherStats, otherColor)}</div>
      <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分</h3>
      ${renderDimBars(otherStats.dimAvgs, otherColor)}
      <h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布</h3>
      <div class="score-dist">${renderDist(otherStats.dist, otherColor)}</div>`;

  } else if (statsFilter==='compare') {
    const myName = currentProfile?.display_name||'我';
    const otherLabel = statsOtherUser ? (allProfiles[statsOtherUser]?.display_name||'对方') : (otherEntries.length>1?'其他人平均':(otherEntries.length>0?allProfiles[otherEntries[0].user_id]?.display_name||'对方':'对方'));
    html += `<div class="stats-grid">
      <div class="stat-card"><div class="stat-value" style="color:${myColor.main}">${myStats?myStats.avgTotal.toFixed(1):'-'}</div><div class="stat-label">${esc(myName)}均分${typeSuffix}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${otherColor.main}">${otherStats?otherStats.avgTotal.toFixed(1):'-'}</div><div class="stat-label">${esc(otherLabel)}均分${typeSuffix}</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.movies:0}/${otherStats?otherStats.movies:0}</div><div class="stat-label">电影 (我/${esc(otherLabel)})</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.series:0}/${otherStats?otherStats.series:0}</div><div class="stat-label">剧集 (我/${esc(otherLabel)})</div></div>
      <div class="stat-card"><div class="stat-value">${myStats?myStats.count:0}/${otherStats?otherStats.count:0}</div><div class="stat-label">总计 (我/${esc(otherLabel)})</div></div>
    </div>
    <h3 style="margin-bottom:10px;font-size:0.9rem;color:var(--text2)">各维度均分对比 <span style="font-size:0.75rem"><span style="color:${myColor.main}">${esc(myName)}</span> / <span style="color:${otherColor.main}">${esc(otherLabel)}</span></span></h3>`;
    for (const dim of Object.keys(WEIGHTS)) {
      const mv = myStats?myStats.dimAvgs[dim]:0;
      const ov = otherStats?otherStats.dimAvgs[dim]:0;
      html += `<div class="stat-compare-row">
        <span class="stat-compare-label">${DIM_LABELS[dim]}</span>
        <div class="stat-compare-bars">
          <div style="height:7px;border-radius:3px;background:${myColor.main};width:${(mv/10)*100}%"></div>
          <div style="height:7px;border-radius:3px;background:${otherColor.main};width:${(ov/10)*100}%"></div>
        </div>
        <div class="stat-compare-values">
          <span style="color:${myColor.main}">${mv.toFixed(1)}</span>
          <span style="color:${otherColor.main}">${ov.toFixed(1)}</span>
        </div>
      </div>`;
    }
    html += `<h3 style="margin:20px 0 10px;font-size:0.9rem;color:var(--text2)">评分分布对比</h3>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.65rem">
      <span style="display:inline-block;width:10px;height:10px;background:${myColor.main};border-radius:2px"></span> ${esc(myName)}
      <span style="display:inline-block;width:10px;height:10px;background:${otherColor.main};border-radius:2px"></span> ${esc(otherLabel)}
    </div>
    <div class="compare-dist">
      ${(myStats?myStats.dist:new Array(10).fill(0)).map((c,i)=>{
        const oc = otherStats?otherStats.dist[i]:0;
        const maxAll = Math.max(...(myStats?myStats.dist:[]),...(otherStats?otherStats.dist:[]),1);
        return `<div class="cd-bar-group">
          <div class="cd-bars">
            <div class="cd-bar" style="height:${(c/maxAll)*100}%;background:${myColor.main}"><span class="cd-count">${c||''}</span></div>
            <div class="cd-bar" style="height:${(oc/maxAll)*100}%;background:${otherColor.main}"><span class="cd-count">${oc||''}</span></div>
          </div>
          <span class="cd-label">${i+1}分</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  container.innerHTML = html;
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`nav button[data-tab="${name}"]`)?.classList.add('active');
  document.getElementById(`panel-${name}`)?.classList.add('active');
  if (name==='list') { listPageNum = 1; renderList(); scrollToHighlight(); }
  if (name==='stats') { renderStats(); }
}

function scrollToHighlight() {
  if (!highlightEntryId) return;
  setTimeout(() => {
    const el = document.getElementById('entry-' + highlightEntryId);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.boxShadow = '0 0 0 3px var(--gold)';
      setTimeout(() => { el.style.boxShadow = ''; }, 2000);
    }
    highlightEntryId = null;
  }, 100);
}
document.querySelectorAll('nav button').forEach(btn=>{ btn.addEventListener('click', ()=>switchTab(btn.dataset.tab)); });

// ===== EXPORT / IMPORT =====
$['exportBtn'].addEventListener('click', async ()=>{
  const data = {
    entries: allEntries.filter(e=>e.user_id===currentUser.id),
    season_ratings: allSeasonRatings.filter(s=>s.user_id===currentUser.id),
    exported_at: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`filmnote-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
});

$['importBtn'].addEventListener('click', ()=>{
  $['importFile'].click();
});

$['importFile'].addEventListener('change', async e=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev=>{
    try {
      const data = JSON.parse(ev.target.result);
      const entries = data.entries || data; // support both formats
      if (!Array.isArray(entries)) throw new Error('格式错误');
      if (!confirm(`将导入 ${entries.length} 条记录，确认？`)) return;

      let count=0;
      for (const m of entries) {
        const {error} = await db.from('entries').insert({
          user_id: currentUser.id,
          type: m.type||'movie',
          tmdb_id: m.tmdb_id||null,
          title: m.title,
          year: m.year||null,
          director: m.director||'',
          poster_path: m.poster_path||'',
          ratings: m.ratings||{},
          total_score: m.total_score||calcTotal(m.ratings||{}),
          comment: m.comment||'',
          created_at: m.created_at||new Date().toISOString(),
          updated_at: new Date().toISOString()
        });
        if (!error) count++;
      }
      toast(`已导入 ${count} 条记录`);
      await loadAllData();
    } catch(err) {
      toast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ===== PAGE LOAD INIT =====
(async ()=>{
  const {data:{session}} = await db.auth.getSession();
  if (session?.user) {
    await initApp(session.user);
  }
})();
</script>
